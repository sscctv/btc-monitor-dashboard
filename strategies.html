<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略管理 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>策略管理</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">账户数</div>
                        <div class="card-value" id="accountCount">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">总交易数</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">总盈亏</div>
                        <div class="card-value" id="totalPnl">--</div>
                    </div>
                </div>
            </section>

            <section class="strategies-section">
                <div class="section-header">
                    <h2>所有账户</h2>
                </div>
                <div class="strategies-grid" id="strategiesGrid">
                    <div class="loading-spinner">加载中...</div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">首页</span></a>
            <a href="strategies.html" class="nav-item active"><span class="nav-icon">⚙️</span><span class="nav-text">策略</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span class="nav-text">信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span class="nav-text">历史</span></a>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        async function loadStrategies() {
            var statusEl = document.getElementById('dbStatus');
            var statusTextEl = document.getElementById('dbStatusText');

            try {
                var trades = await fetchAllTrades();

                if (trades && trades.length > 0) {
                    // 为每笔交易计算盈亏
                    var enrichedTrades = trades.map(function(t) {
                        return enrichTradeWithPnL(t);
                    });

                    var stats = transformTradesData(enrichedTrades);

                    statusEl.className = 'status-dot online';
                    statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';

                    document.getElementById('accountCount').textContent = stats.length;
                    document.getElementById('totalTrades').textContent = enrichedTrades.length;
                    
                    var totalPnl = stats.reduce(function(s, t) { return s + t.total_pnl; }, 0);
                    document.getElementById('totalPnl').textContent = formatNumber(totalPnl);
                    document.getElementById('totalPnl').className = 'card-value ' + getPnLClass(totalPnl);

                    renderStrategies(stats);
                } else {
                    statusEl.className = 'status-dot offline';
                    statusTextEl.textContent = '无数据';
                    renderStrategies([]);
                }
            } catch (error) {
                console.error('Load error:', error);
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线';
                renderStrategies([]);
            }
        }

        function renderStrategies(stats) {
            var grid = document.getElementById('strategiesGrid');

            if (!stats || stats.length === 0) {
                grid.innerHTML = '<div class="loading-spinner">暂无数据</div>';
                return;
            }

            grid.innerHTML = stats.map(function(s) {
                var actionClass = s.total_pnl >= 0 ? 'profit' : 'loss';
                var winLoss = s.wins + '胜 / ' + s.losses + '负';

                return '<div class="strategy-card">' +
                    '<div class="strategy-header">' +
                    '<span class="strategy-name">' + s.strategy_name + '</span>' +
                    '<span class="strategy-badge ' + actionClass + '">' + formatPercent(s.total_pnl_percent) + '</span>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">交易数</span><span class="stat-value">' + s.trade_count + '</span></div>' +
                    '<div class="stat"><span class="stat-label">胜/负</span><span class="stat-value">' + winLoss + '</span></div>' +
                    '<div class="stat"><span class="stat-label">胜率</span><span class="stat-value">' + s.win_rate.toFixed(1) + '%</span></div>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">总盈亏</span><span class="stat-value ' + actionClass + '">' + formatNumber(s.total_pnl) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">余额</span><span class="stat-value">' + formatNumber(s.balance) + '</span></div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadStrategies);
    </script>
</body>
</html>
