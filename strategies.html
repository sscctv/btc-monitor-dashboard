<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>策略管理 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="brand">
            <span class="brand-icon">⚙️</span>
            <span>策略管理</span>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            <span id="updateTime">实时</span>
        </div>
    </div>

    <div class="container">
        <!-- 总览统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">策略总数</div>
                <div class="stat-value">15</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总资金</div>
                <div class="stat-value" id="totalBalance">$85,234</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总盈亏</div>
                <div class="stat-value" style="color: var(--accent-primary)" id="totalPnl">+$76,398</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今日交易</div>
                <div class="stat-value" id="todayTrades">23</div>
            </div>
        </div>

        <!-- 筛选 -->
        <div class="filter-bar">
            <select class="filter-select" id="strategyTypeFilter" onchange="filterStrategies()">
                <option value="all">全部策略</option>
                <option value="bb">BB策略</option>
                <option value="rsi">RSI策略</option>
            </select>
            <select class="filter-select" id="statusFilter" onchange="filterStrategies()">
                <option value="all">全部状态</option>
                <option value="active">交易中</option>
                <option value="idle">空闲</option>
            </select>
        </div>

        <!-- BB策略（原项目5个） -->
        <div class="card" id="bbStrategies">
            <div class="card-header">
                <span class="card-title">📊 BB策略（原项目）</span>
                <span class="badge badge-pending">5个策略</span>
            </div>
            <div class="strategy-cards" id="bbStrategyList">
                <!-- BB策略卡片将由JS生成 -->
            </div>
        </div>

        <!-- RSI策略（新增Top 10） -->
        <div class="card" id="rsiStrategies">
            <div class="card-header">
                <span class="card-title">🎯 RSI策略（Top 10）</span>
                <span class="badge badge-success">10个策略</span>
            </div>
            <div class="strategy-cards" id="rsiStrategyList">
                <!-- RSI策略卡片将由JS生成 -->
            </div>
        </div>

        <!-- 策略对比图表 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📈 策略收益对比</span>
            </div>
            <div class="chart-container" id="compareChart"></div>
        </div>
    </div>

    <!-- 交易记录弹窗 -->
    <div class="modal" id="tradeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">交易记录</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="strategy-summary" id="strategySummary">
                    <!-- 策略摘要 -->
                </div>
                <div class="trade-list" id="tradeList">
                    <!-- 交易记录列表 -->
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">首页</span>
        </a>
        <a href="virtual.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-text">交易</span>
        </a>
        <a href="signals.html" class="nav-item">
            <span class="nav-icon">📡</span>
            <span class="nav-text">信号</span>
        </a>
        <a href="strategies.html" class="nav-item active">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">策略</span>
        </a>
        <a href="history.html" class="nav-item">
            <span class="nav-icon">📜</span>
            <span class="nav-text">记录</span>
        </a>
    </nav>

    <style>
        /* 策略卡片 */
        .strategy-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .strategy-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s;
        }

        .strategy-card:active {
            transform: scale(0.98);
        }

        .strategy-card.has-position {
            border-left: 4px solid var(--accent-primary);
        }

        .strategy-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .strategy-card-name {
            font-size: 15px;
            font-weight: 600;
        }

        .strategy-card-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .strategy-card-status.active {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent-primary);
        }

        .strategy-card-status.idle {
            background: rgba(156, 163, 175, 0.15);
            color: var(--text-secondary);
        }

        .strategy-card-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .strategy-metric {
            text-align: center;
        }

        .strategy-metric-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .strategy-metric-value {
            font-size: 16px;
            font-weight: 600;
        }

        .strategy-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .position-info {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .position-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .position-badge.long {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent-primary);
        }

        .position-badge.short {
            background: rgba(255, 107, 107, 0.15);
            color: var(--accent-danger);
        }

        .win-rate {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .win-rate span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: var(--bg-card);
            margin: 20px;
            border-radius: 16px;
            max-height: calc(100vh - 40px);
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        .strategy-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-item {
            background: var(--bg-secondary);
            padding: 14px;
            border-radius: 10px;
            text-align: center;
        }

        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 600;
        }

        .trade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .trade-item {
            background: var(--bg-secondary);
            padding: 14px;
            border-radius: 10px;
        }

        .trade-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .trade-item-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .trade-item-pnl {
            font-weight: 600;
        }

        .trade-item-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .trade-item-details span:first-child {
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>

    <script>
        // 从Supabase获取真实策略数据
        let strategiesData = { bb: [], rsi: [] };
        
        async function fetchStrategies() {
            try {
                const res = await fetch('https://lpcrnobolifrzwrkxoli.supabase.co/storage/v1/object/public/virt-data/virt_positions.json?t=' + Date.now());
                const data = await res.json();
                const accounts = data.accounts || [];
                
                // BB策略 (S1-S8) 和 RSI策略 (R1-R10) 分类
                const bbAccounts = accounts.filter(a => a.account.startsWith('S'));
                const rsiAccounts = accounts.filter(a => a.account.startsWith('R'));
                
                strategiesData.bb = bbAccounts.map((a, i) => ({
                    id: i + 1,
                    name: a.strategy_name || 'BB策略',
                    type: 'bb',
                    lev: a.leverage || 30,
                    initial: a.initial || 1000,
                    balance: a.balance || 1000,
                    pnl: (a.balance || 1000) - (a.initial || 1000),
                    pnlPercent: ((a.balance || 1000) - (a.initial || 1000)) / (a.initial || 1000) * 100,
                    trades: a.total_trades || 0,
                    wins: a.win || 0,
                    winRate: a.win_rate || 0,
                    position: a.side ? { type: a.side === 'long' ? '做多' : '做空', entry: a.entry || 0, current: a.current || 0 } : null,
                    status: a.side ? 'active' : 'idle',
                    lastTrade: a.updated_at || ''
                }));
                
                strategiesData.rsi = rsiAccounts.map((a, i) => ({
                    id: i + 6,
                    name: a.strategy_name || `RSI策略 ${a.account}`,
                    type: 'rsi',
                    params: a.strategy_name || '',
                    initial: a.initial || 1000,
                    balance: a.balance || 1000,
                    pnl: (a.balance || 1000) - (a.initial || 1000),
                    pnlPercent: ((a.balance || 1000) - (a.initial || 1000)) / (a.initial || 1000) * 100,
                    trades: a.total_trades || 0,
                    wins: a.win || 0,
                    winRate: a.win_rate || 0,
                    position: a.side ? { type: a.side === 'long' ? '做多' : '做空', entry: a.entry || 0, current: a.current || 0 } : null,
                    status: a.side ? 'active' : 'idle',
                    lastTrade: a.updated_at || '',
                    recent_trades: a.recent_trades || []
                }));
                
                // 更新统计
                const totalBalance = accounts.reduce((sum, a) => sum + (a.balance || 0), 0);
                const totalPnl = accounts.reduce((sum, a) => sum + ((a.balance || 1000) - (a.initial || 1000)), 0);
                document.getElementById('totalBalance').textContent = '$' + Math.round(totalBalance).toLocaleString();
                document.getElementById('totalPnl').textContent = (totalPnl >= 0 ? '+' : '') + '$' + Math.round(totalPnl).toLocaleString();
                document.getElementById('totalPnl').style.color = totalPnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)';
                
                renderBBStrategies();
                renderRSIStrategies();
                renderCompareChart();
                
            } catch(e) {
                console.error('Failed to fetch strategies:', e);
            }
        }

        // 渲染策略卡片
        function renderStrategyCard(strategy) {
            const hasPosition = strategy.position !== null;
            const pnlColor = strategy.pnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)';
            
            return `
                <div class="strategy-card ${hasPosition ? 'has-position' : ''}" onclick="openTradeModal(${strategy.id}, '${strategy.name}')">
                    <div class="strategy-card-header">
                        <span class="strategy-card-name">${strategy.name}</span>
                        <span class="strategy-card-status ${strategy.status}">${strategy.status === 'active' ? '交易中' : '空闲'}</span>
                    </div>
                    <div class="strategy-card-metrics">
                        <div class="strategy-metric">
                            <div class="strategy-metric-label">初始资金</div>
                            <div class="strategy-metric-value">$${strategy.initial.toLocaleString()}</div>
                        </div>
                        <div class="strategy-metric">
                            <div class="strategy-metric-label">当前余额</div>
                            <div class="strategy-metric-value">$${strategy.balance.toLocaleString()}</div>
                        </div>
                        <div class="strategy-metric">
                            <div class="strategy-metric-label">浮动盈亏</div>
                            <div class="strategy-metric-value" style="color: ${pnlColor}">${strategy.pnl >= 0 ? '+' : ''}$${strategy.pnl.toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="strategy-card-footer">
                        <div class="position-info">
                            ${hasPosition ? `
                                <span class="position-badge ${strategy.position.type === '做多' ? 'long' : 'short'}">
                                    ${strategy.position.type} | $${strategy.position.entry.toLocaleString()}
                                </span>
                            ` : '<span style="color: var(--text-secondary); font-size: 13px;">无持仓</span>'}
                        </div>
                        <span class="win-rate">胜率 <span>${strategy.winRate}%</span> | ${strategy.trades}笔</span>
                    </div>
                </div>
            `;
        }

        // 渲染BB策略列表
        function renderBBStrategies() {
            const container = document.getElementById('bbStrategyList');
            container.innerHTML = strategiesData.bb.map(s => renderStrategyCard(s)).join('');
        }

        // 渲染RSI策略列表
        function renderRSIStrategies() {
            const container = document.getElementById('rsiStrategyList');
            container.innerHTML = strategiesData.rsi.map(s => renderStrategyCard(s)).join('');
        }

        // 筛选策略
        function filterStrategies() {
            const typeFilter = document.getElementById('strategyTypeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            document.getElementById('bbStrategies').style.display = 
                (typeFilter === 'all' || typeFilter === 'bb') ? 'block' : 'none';
            document.getElementById('rsiStrategies').style.display = 
                (typeFilter === 'all' || typeFilter === 'rsi') ? 'block' : 'none';
        }

        // 打开交易记录弹窗
        function openTradeModal(strategyId, strategyName) {
            const modal = document.getElementById('tradeModal');
            const summary = document.getElementById('strategySummary');
            const tradeList = document.getElementById('tradeList');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.textContent = strategyName;
            
            // 查找策略
            let strategy = null;
            for (const s of [...strategiesData.bb, ...strategiesData.rsi]) {
                if (s.id === strategyId) {
                    strategy = s;
                    break;
                }
            }
            
            if (strategy) {
                const pnlColor = strategy.pnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)';
                summary.innerHTML = `
                    <div class="summary-item">
                        <div class="summary-label">初始资金</div>
                        <div class="summary-value">$${strategy.initial.toLocaleString()}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">当前余额</div>
                        <div class="summary-value">$${strategy.balance.toLocaleString()}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">总盈亏</div>
                        <div class="summary-value" style="color: ${pnlColor}">${strategy.pnl >= 0 ? '+' : ''}$${strategy.pnl.toLocaleString()}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">收益率</div>
                        <div class="summary-value" style="color: ${pnlColor}">${strategy.pnlPercent >= 0 ? '+' : ''}${strategy.pnlPercent.toFixed(1)}%</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">交易次数</div>
                        <div class="summary-value">${strategy.trades}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">胜率</div>
                        <div class="summary-value" style="color: var(--accent-primary)">${strategy.winRate}%</div>
                    </div>
                `;
                
                // 获取交易记录
                const trades = strategy.recent_trades || [];
                if (trades.length > 0) {
                    tradeList.innerHTML = trades.map(t => `
                        <div class="trade-item">
                            <div class="trade-item-header">
                                <span class="trade-item-time">${t.time}</span>
                                <span class="trade-item-pnl" style="color: ${t.pnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)'}">
                                    ${t.pnl >= 0 ? '+' : ''}$${t.pnl.toFixed(2)}
                                </span>
                            </div>
                            <div class="trade-item-details">
                                <span>${t.type} ${t.entry} → ${t.exit}</span>
                                <span>${t.reason}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    tradeList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>暂无交易记录</p>
                        </div>
                    `;
                }
            }
            
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('tradeModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        // 点击弹窗背景关闭
        document.getElementById('tradeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 渲染对比图表
        function renderCompareChart() {
            const chart = echarts.init(document.getElementById('compareChart'));
            const allStrategies = [...strategiesData.bb, ...strategiesData.rsi];
            
            const sortedByPnl = allStrategies.sort((a, b) => b.pnl - a.pnl).slice(0, 10);
            
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        const data = params[0];
                        return `${data.name}<br/>收益率: ${data.value}%`;
                    }
                },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: sortedByPnl.map(s => s.name.substring(0, 8)),
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#888', fontSize: 9, rotate: 30 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: '#333' } },
                    axisLabel: { color: '#888', fontSize: 10, formatter: '{value}%' }
                },
                series: [{
                    type: 'bar',
                    data: sortedByPnl.map((s, i) => ({
                        value: s.pnlPercent.toFixed(0),
                        itemStyle: {
                            color: i < 3 ? ['#ffd700', '#c0c0c0', '#cd7f32'][i] : '#0096ff',
                            borderRadius: [4, 4, 0, 0]
                        }
                    })),
                    barWidth: '60%'
                }]
            });

            window.addEventListener('resize', () => chart.resize());
        }

        // 更新总览统计
        function updateSummary() {
            const all = [...strategiesData.bb, ...strategiesData.rsi];
            const totalBalance = all.reduce((sum, s) => sum + s.balance, 0);
            const totalPnl = all.reduce((sum, s) => sum + s.pnl, 0);
            const todayTrades = all.reduce((sum, s) => sum + Math.floor(s.trades / 15), 0);
            
            document.getElementById('totalBalance').textContent = '$' + totalBalance.toLocaleString();
            document.getElementById('totalPnl').textContent = (totalPnl >= 0 ? '+' : '') + '$' + totalPnl.toLocaleString();
            document.getElementById('totalPnl').style.color = totalPnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)';
            document.getElementById('todayTrades').textContent = todayTrades;
        }

        // 初始化
        renderBBStrategies();
        renderRSIStrategies();
        renderCompareChart();
        updateSummary();

        // 更新按钮显示
        document.getElementById('updateTime').textContent = '更新于 ' + new Date().toLocaleTimeString();
    </script>
</body>
</html>
