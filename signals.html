<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>信号 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>交易信号</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">加载中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="strategies-section">
                <div class="section-header"><h2>指标信号</h2></div>
                <div id="signalList">
                    <div class="strategy-card">
                        <div class="strategy-header">
                            <span class="strategy-name">BTC/USDT</span>
                            <span class="strategy-badge profit">做多信号</span>
                        </div>
                        <div class="strategy-stats">
                            <div class="stat"><span class="stat-label">RSI 14</span><span class="stat-value">32.5</span></div>
                            <div class="stat"><span class="stat-label">MA 20</span><span class="stat-value profit">↑ 突破</span></div>
                            <div class="stat"><span class="stat-label">MACD</span><span class="stat-value profit">金叉</span></div>
                        </div>
                    </div>

                    <div class="strategy-card">
                        <div class="strategy-header">
                            <span class="strategy-name">ETH/USDT</span>
                            <span class="strategy-badge loss">观望</span>
                        </div>
                        <div class="strategy-stats">
                            <div class="stat"><span class="stat-label">RSI 14</span><span class="stat-value">58.2</span></div>
                            <div class="stat"><span class="stat-label">MA 20</span><span class="stat-value">横盘</span></div>
                            <div class="stat"><span class="stat-label">MACD</span><span class="stat-value loss">死叉</span></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span>策略</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item active"><span class="nav-icon">📡</span><span>信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span>历史</span></a>
        </nav>
    </div>

    <script>
        document.getElementById('dbStatus').className = 'status-dot online';
        document.getElementById('dbStatusText').textContent = '示例数据';
    </script>
</body>
</html>
