<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时信号 - BTC Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header"><h1>实时信号</h1><div class="connection-status"><span id="status" class="status-dot online"></span><span>实时</span></div></header>
        <main class="main-content">
            <section class="chart-section">
                <div class="section-header"><h2>BTC 价格</h2></div>
                <div class="chart-wrapper"><div id="priceChart" class="chart" style="height:300px"></div></div>
            </section>
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card"><div class="card-label">当前价格</div><div class="card-value" id="currentPrice">--</div></div>
                    <div class="card"><div class="card-label">24h 涨跌</div><div class="card-value" id="priceChange">--</div></div>
                    <div class="card"><div class="card-label">24h 成交量</div><div class="card-value" id="volume">--</div></div>
                </div>
            </section>
            <section class="strategies-section">
                <div class="section-header"><h2>技术指标</h2></div>
                <div class="strategies-grid" id="indicatorsGrid"><p>加载中...</p></div>
            </section>
        </main>
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span>策略</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item active"><span class="nav-icon">📡</span><span>信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span>历史</span></a>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://lpcrnbolifrzwrkxoli.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8gEsCRNRc7py6BmypYuRIw_sNtKooug';
        let priceChart = echarts.init(document.getElementById('priceChart'));

        async function fetchFromSupabase(table) {
            try { const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=created_at.desc&limit=100`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); return r.ok ? await r.json() : null; }
            catch (e) { console.error(e); return null; }
        }

        async function loadSignals() {
            const data = await fetchFromSupabase('market_data');
            if (data && data.length > 0) {
                const latest = data[0];
                document.getElementById('currentPrice').textContent = (latest.price || '--').toLocaleString();
                document.getElementById('priceChange').textContent = (latest.change_24h >= 0 ? '+' : '') + (latest.change_24h || 0).toFixed(2) + '%';
                document.getElementById('priceChange').className = 'card-value ' + (latest.change_24h >= 0 ? 'profit' : 'loss');
                document.getElementById('volume').textContent = ((latest.volume || 0) / 1000000).toFixed(2) + 'M';
                priceChart.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: 50, right: 20, top: 20, bottom: 30 },
                    xAxis: { type: 'category', data: data.slice().reverse().map(d => d.created_at ? d.created_at.substring(5, 10) : ''), axisLine: { lineStyle: { color: '#233554' } }, axisLabel: { color: '#8892b0' } },
                    yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: '#233554' } }, axisLabel: { color: '#8892b0', formatter: '${value}' } },
                    series: [{ type: 'line', data: data.slice().reverse().map(d => d.price), smooth: true, lineStyle: { width: 2, color: '#00d4aa' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(0,212,170,0.3)' }, { offset: 1, color: 'rgba(0,212,170,0)' }] } } }]
                });
                const indicators = [
                    { name: 'RSI (14)', value: latest.rsi || '--', status: (latest.rsi > 70 ? 'overbought' : latest.rsi < 30 ? 'oversold' : 'neutral') },
                    { name: 'MACD', value: (latest.macd || 0).toFixed(2), status: (latest.macd > 0 ? 'bullish' : 'bearish') },
                    { name: '布林带位置', value: ((latest.bb_position || 0.5) * 100).toFixed(0) + '%', status: 'neutral' }
                ];
                document.getElementById('indicatorsGrid').innerHTML = indicators.map(i => '<div class=\"strategy-card\"><div class=\"strategy-header\"><span>' + i.name + '</span><span class=\"strategy-badge ' + i.status + '\">' + i.value + '</span></div></div>').join('');
            } else {
                document.getElementById('indicatorsGrid').innerHTML = '<p>暂无数据</p>';
            }
        }
        window.addEventListener('resize', () => priceChart.resize());
        document.addEventListener('DOMContentLoaded', loadSignals);
    </script>
</body>
</html>
