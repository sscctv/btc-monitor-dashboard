<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>交易记录 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>交易记录</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总交易</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">盈利交易</div>
                        <div class="card-value profit" id="wins">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">亏损交易</div>
                        <div class="card-value loss" id="losses">--</div>
                    </div>
                </div>
            </section>

            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总盈亏</div>
                        <div class="card-value" id="totalPnl">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">胜率</div>
                        <div class="card-value" id="winRate">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">平均盈亏</div>
                        <div class="card-value" id="avgPnl">--</div>
                    </div>
                </div>
            </section>

            <section class="strategies-section">
                <div class="section-header">
                    <h2>交易列表</h2>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all">全部</button>
                        <button class="filter-tab" data-filter="profit">盈利</button>
                        <button class="filter-tab" data-filter="loss">亏损</button>
                    </div>
                </div>
                <div id="tradeList"><div class="loading-spinner">加载中...</div></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="virtual.html" class="nav-item active"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span>信号</span></a>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        var allTrades = [];
        var currentFilter = 'all';

        async function loadData() {
            var statusEl = document.getElementById('dbStatus');
            var statusTextEl = document.getElementById('dbStatusText');
            try {
                var trades = await fetchAllTrades();
                if (trades && trades.length > 0) {
                    allTrades = trades.map(function(t) { return enrichTradeWithPnL(t); });
                    statusEl.className = 'status-dot online';
                    statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';
                    updateOverview();
                    renderTrades();
                } else {
                    useSampleData();
                }
            } catch (error) {
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线';
                useSampleData();
            }
        }

        function useSampleData() {
            allTrades = [];
            updateOverview();
            renderTrades();
            document.getElementById('dbStatusText').textContent = '示例';
        }

        function updateOverview() {
            var wins = 0, losses = 0, totalPnl = 0;
            allTrades.forEach(function(t) {
                var pnl = t.realized_pnl || 0;
                totalPnl += pnl;
                if (pnl > 0) wins++;
                else if (pnl < 0) losses++;
            });
            var winRate = allTrades.length > 0 ? (wins / allTrades.length) * 100 : 0;
            var avgPnl = allTrades.length > 0 ? (totalPnl / allTrades.length) : 0;
            
            document.getElementById('totalTrades').textContent = allTrades.length;
            document.getElementById('wins').textContent = wins;
            document.getElementById('losses').textContent = losses;
            
            var pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + formatNumber(totalPnl);
            pnlEl.className = 'card-value ' + getPnLClass(totalPnl);
            
            document.getElementById('winRate').textContent = winRate.toFixed(1) + '%';
            
            var avgEl = document.getElementById('avgPnl');
            avgEl.textContent = (avgPnl >= 0 ? '+' : '') + formatNumber(avgPnl);
            avgEl.className = 'card-value ' + getPnLClass(avgPnl);
        }

        function renderTrades() {
            var container = document.getElementById('tradeList');
            var filtered = allTrades;
            
            if (currentFilter === 'profit') {
                filtered = allTrades.filter(function(t) { return (t.realized_pnl || 0) > 0; });
            } else if (currentFilter === 'loss') {
                filtered = allTrades.filter(function(t) { return (t.realized_pnl || 0) < 0; });
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无交易记录</div>';
                return;
            }
            container.innerHTML = filtered.slice(0, 100).map(function(t) {
                var side = (t.side || '--').toUpperCase();
                var sideClass = (side === 'LONG' || side === 'BUY') ? 'long' : ((side === 'SHORT' || side === 'SELL') ? 'short' : '');
                var pnlClass = getPnLClass(t.realized_pnl);
                var date = t.opened_at ? t.opened_at.replace('T', ' ').substring(0, 16) : '--';
                var strategy = t.strategy || t.account_id || 'Unknown';
                return '<div class="strategy-card">' +
                    '<div class="strategy-header">' +
                    '<span class="strategy-name">' + strategy + '</span>' +
                    '<span class="trade-type ' + sideClass + '">' + side + '</span>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">盈亏</span><span class="stat-value ' + pnlClass + '">' + (t.realized_pnl >= 0 ? '+' : '') + formatNumber(t.realized_pnl) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">开仓价</span><span class="stat-value">' + formatNumber(t.entry_price) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">平仓价</span><span class="stat-value">' + formatNumber(t.close_price) + '</span></div>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">数量</span><span class="stat-value">' + formatNumber(t.size, 4) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">杠杆</span><span class="stat-value">' + (t.leverage || 0) + 'x</span></div>' +
                    '<div class="stat"><span class="stat-label">时间</span><span class="stat-value">' + date + '</span></div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        // 筛选标签点击事件
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.filter-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTrades();
                });
            });
            loadData();
        });
    </script>
</body>
</html>
