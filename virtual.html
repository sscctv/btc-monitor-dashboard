<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟交易 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header"><h1>虚拟交易</h1><div class="connection-status"><span id="dbStatus" class="status-dot offline"></span><span id="dbStatusText">连接中...</span></div></header>
        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card"><div class="card-label">总余额</div><div class="card-value" id="totalBalance">--</div></div>
                    <div class="card"><div class="card-label">总盈亏</div><div class="card-value" id="totalPnl">--</div></div>
                    <div class="card"><div class="card-label">交易次数</div><div class="card-value" id="tradeCount">--</div></div>
                </div>
            </section>
            <section class="strategies-section">
                <div class="section-header"><h2>当前持仓</h2></div>
                <div class="strategies-grid" id="positionsGrid"><p>加载中...</p></div>
            </section>
        </main>
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span>策略</span></a>
            <a href="virtual.html" class="nav-item active"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span>信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span>历史</span></a>
        </nav>
    </div>
    <script>
        const SUPABASE_URL = 'https://lpcrnbolifrzwrkxoli.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8gEsCRNRc7py6BmypYuRIw_sNtKooug';
        async function fetchFromSupabase(table) {
            try { const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); return r.ok ? await r.json() : null; }
            catch (e) { console.error(e); return null; }
        }
        async function loadData() {
            const statusEl = document.getElementById('dbStatus');
            const [balances, trades] = await Promise.all([fetchFromSupabase('virtual_balances'), fetchFromSupabase('virtual_trades')]);
            statusEl.className = 'status-dot ' + (balances ? 'online' : 'offline');
            document.getElementById('dbStatusText').textContent = balances ? '已连接' : '离线';
            const total = (balances || []).reduce((s, b) => s + (b.balance || 0), 0);
            const pnl = (balances || []).reduce((s, b) => s + (b.total_pnl || 0), 0);
            document.getElementById('totalBalance').textContent = total.toFixed(2);
            document.getElementById('totalPnl').textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);
            document.getElementById('totalPnl').className = 'card-value ' + (pnl >= 0 ? 'profit' : 'loss');
            document.getElementById('tradeCount').textContent = (trades || []).length;
            const positions = (trades || []).filter(t => !t.closed);
            document.getElementById('positionsGrid').innerHTML = positions.length ? positions.map(p => '<div class=\"strategy-card\"><div class=\"strategy-header\"><span>' + (p.strategy_name || '') + '</span><span class=\"' + (p.action === 'LONG' ? 'profit' : 'loss') + '\">' + (p.action || '') + '</span></div><div class=\"strategy-stats\"><div class=\"stat\"><span class=\"stat-label\">数量</span><span>' + (p.quantity || '') + '</span></div><div class=\"stat\"><span class=\"stat-label\">开仓价</span><span>' + (p.entry_price || '') + '</span></div></div></div>').join('') : '<p>暂无持仓</p>';
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
