<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>交易 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>交易概览</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总盈亏</div>
                        <div class="card-value" id="totalPnl">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">交易数</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">胜率</div>
                        <div class="card-value" id="winRate">--</div>
                    </div>
                </div>
            </section>

            <section class="strategies-section">
                <div class="section-header"><h2>最新交易</h2></div>
                <div id="tradeList"><div class="loading-spinner">加载中...</div></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span>策略</span></a>
            <a href="virtual.html" class="nav-item active"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span>信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span>历史</span></a>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        var allTrades = [];

        async function loadData() {
            var statusEl = document.getElementById('dbStatus');
            var statusTextEl = document.getElementById('dbStatusText');
            try {
                var trades = await fetchAllTrades();
                if (trades && trades.length > 0) {
                    allTrades = trades.map(function(t) { return enrichTradeWithPnL(t); });
                    statusEl.className = 'status-dot online';
                    statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';
                    updateOverview();
                    renderTrades();
                } else {
                    useSampleData();
                }
            } catch (error) {
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线';
                useSampleData();
            }
        }

        function useSampleData() {
            allTrades = [];
            updateOverview();
            renderTrades();
            document.getElementById('dbStatusText').textContent = '示例';
        }

        function updateOverview() {
            var totalPnl = 0, wins = 0;
            allTrades.forEach(function(t) {
                totalPnl += t.realized_pnl || 0;
                if ((t.realized_pnl || 0) > 0) wins++;
            });
            var winRate = allTrades.length > 0 ? (wins / allTrades.length) * 100 : 0;
            var pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + formatNumber(totalPnl);
            pnlEl.className = 'card-value ' + getPnLClass(totalPnl);
            document.getElementById('totalTrades').textContent = allTrades.length;
            document.getElementById('winRate').textContent = winRate.toFixed(1) + '%';
        }

        function renderTrades() {
            var container = document.getElementById('tradeList');
            if (allTrades.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无交易</div>';
                return;
            }
            var recent = allTrades.slice(0, 20);
            container.innerHTML = recent.map(function(t) {
                var side = (t.side || '--').toUpperCase();
                var sideClass = (side === 'LONG' || side === 'BUY') ? 'long' : ((side === 'SHORT' || side === 'SELL') ? 'short' : '');
                var pnlClass = getPnLClass(t.realized_pnl);
                var date = t.opened_at ? t.opened_at.replace('T', ' ').substring(0, 16) : '--';
                var strategy = t.strategy || t.account_id || 'Unknown';
                return '<div class="strategy-card">' +
                    '<div class="strategy-header">' +
                    '<span class="strategy-name">' + strategy + '</span>' +
                    '<span class="trade-type ' + sideClass + '">' + side + '</span>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">盈亏</span><span class="stat-value ' + pnlClass + '">' + (t.realized_pnl >= 0 ? '+' : '') + formatNumber(t.realized_pnl) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">数量</span><span class="stat-value">' + formatNumber(t.size, 4) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">杠杆</span><span class="stat-value">' + (t.leverage || 0) + 'x</span></div>' +
                    '</div>' +
                    '<div style="margin-top:10px;font-size:11px;color:var(--text-secondary);">' + date + '</div>' +
                    '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
