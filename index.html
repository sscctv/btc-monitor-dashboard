<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="brand">
            <span class="brand-icon">📊</span>
            <span>BTC Dashboard</span>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            <span id="updateTime">加载中</span>
        </div>
    </div>

    <div class="container">
        <!-- BTC 价格卡片 -->
        <div class="price-card">
            <div class="price-label">BTC/USDT</div>
            <div class="price-value" id="btcPrice">--</div>
            <div class="price-change" id="priceChange">
                <span>--</span>
            </div>
        </div>

        <!-- 总览统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">策略总数</div>
                <div class="stat-value" id="totalStrategies">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总资金</div>
                <div class="stat-value" id="totalBalance">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总盈亏</div>
                <div class="stat-value" id="totalPnl">--</div>
            </div>
            <div class="stat-card stat-card full-width">
                <div class="stat-label">目标进度 ($1,000,000)</div>
                <div class="stat-value" id="progressPercent">--</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-actions">
            <a href="virtual.html" class="quick-action">
                <span class="quick-action-icon">📊</span>
                <span class="quick-action-text">虚拟交易</span>
            </a>
            <a href="signals.html" class="quick-action">
                <span class="quick-action-icon">📡</span>
                <span class="quick-action-text">实时信号</span>
            </a>
            <a href="strategies.html" class="quick-action">
                <span class="quick-action-icon">⚙️</span>
                <span class="quick-action-text">策略管理</span>
            </a>
            <a href="history.html" class="quick-action">
                <span class="quick-action-icon">📜</span>
                <span class="quick-action-text">历史记录</span>
            </a>
        </div>

        <!-- 策略概览 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🎯 策略概览</span>
                <a href="strategies.html" class="card-action">查看全部 →</a>
            </div>
            <div class="strategy-list" id="strategyOverview">
                <div class="loading-text">加载中...</div>
            </div>
        </div>

        <!-- 收益图表 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📈 收益曲线</span>
                <a href="history.html" class="card-action">查看全部 →</a>
            </div>
            <div class="chart-container" id="profitChart"></div>
        </div>

        <!-- Top 3 策略 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🏆 Top 3 策略</span>
                <a href="strategies.html" class="card-action">全部策略 →</a>
            </div>
            <div class="strategy-list" id="topStrategies">
                <div class="loading-text">加载中...</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">首页</span>
        </a>
        <a href="virtual.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-text">交易</span>
        </a>
        <a href="signals.html" class="nav-item">
            <span class="nav-icon">📡</span>
            <span class="nav-text">信号</span>
        </a>
        <a href="strategies.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">策略</span>
        </a>
        <a href="history.html" class="nav-item">
            <span class="nav-icon">📜</span>
            <span class="nav-text">记录</span>
        </a>
    </nav>

    <script>
    // ==================== Supabase 配置 ====================
    const SUPABASE_URL = 'https://lpcrnbolifrzwrkxoli.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwY3Jub2JvbGlmcnp3cmt4b2xpIiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDUzMTQwMDAsImV4cCI6MTk2MDg5MDQwMH0.YOURCE_SUPABASE_SECRET';

    // ==================== API 工具 ====================
    async function fetchAPI(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        return res.json();
    }

    async function fetchStorage(path) {
        const url = `${SUPABASE_URL}/storage/v1/object/public/virt-data/${path}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Storage Error: ${res.status}`);
        return res.json();
    }

    // ==================== 格式化工具 ====================
    function fmt(n, d = 2) {
        if (n == null || isNaN(n)) return '--';
        return n.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function fmtPnl(n) {
        if (n == null) return '--';
        const sign = n >= 0 ? '+' : '';
        return sign + '$' + fmt(Math.abs(n));
    }

    // ==================== 更新首页 ====================
    async function loadDashboard() {
        try {
            // 获取市场数据
            let marketData = { price: 0, rsi: 50, adx: 20, mode: 'wait' };
            try {
                marketData = await fetchStorage('market_data.json');
            } catch (e) {
                console.log('Market data fetch failed, using default');
            }

            // 更新BTC价格
            const price = marketData.price || 0;
            document.getElementById('btcPrice').textContent = '$' + fmt(price);
            
            const changeEl = document.getElementById('priceChange');
            changeEl.className = 'price-change';
            changeEl.innerHTML = `<span>RSI: ${fmt(marketData.rsi || 50, 0)}</span>`;

            // 获取策略余额数据
            let strategies = [];
            let balances = [];
            try {
                balances = await fetchAPI('/virtual_balances?select=*&order=total_pnl.desc');
            } catch (e) {
                console.log('Balances fetch failed');
            }

            // 获取交易数据
            let trades = [];
            try {
                trades = await fetchAPI('/virtual_trades?select=*&order=created_at.desc&limit=100');
            } catch (e) {
                console.log('Trades fetch failed');
            }

            // 更新统计数据
            const totalStrategies = balances.length || 15;
            const totalBalance = balances.reduce((sum, b) => sum + (b.current_balance || 0), 1000 * totalStrategies);
            const totalPnl = balances.reduce((sum, b) => sum + (b.total_pnl || 0), 0);
            const progressPercent = Math.min((totalBalance / 1000000) * 100, 100);

            document.getElementById('totalStrategies').textContent = totalStrategies;
            document.getElementById('totalBalance').textContent = '$' + fmt(totalBalance);
            
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = fmtPnl(totalPnl);
            pnlEl.style.color = totalPnl >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)';
            
            document.getElementById('progressPercent').textContent = fmt(progressPercent, 1) + '%';
            document.getElementById('progressFill').style.width = fmt(progressPercent, 1) + '%';

            // 更新策略概览列表
            const overviewEl = document.getElementById('strategyOverview');
            if (balances.length > 0) {
                overviewEl.innerHTML = balances.slice(0, 5).map((b, i) => `
                    <div class="strategy-item" onclick="location.href='strategies.html'">
                        <span class="strategy-rank rank-${i < 3 ? i + 1 : 0}">${i + 1}</span>
                        <div class="strategy-info">
                            <div class="strategy-name">${b.strategy_name || '策略' + (i + 1)}</div>
                            <div class="strategy-params">
                                余额: $${fmt(b.current_balance || 1000)} | 
                                胜率: ${b.win_rate ? fmt(b.win_rate, 1) : '--'}%
                            </div>
                        </div>
                        <span class="strategy-profit" style="color: ${(b.total_pnl || 0) >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)'}">
                            ${fmtPnl(b.total_pnl || 0)}
                        </span>
                    </div>
                `).join('');
            } else {
                overviewEl.innerHTML = '<div class="loading-text">暂无策略数据</div>';
            }

            // 更新Top 3策略
            const topEl = document.getElementById('topStrategies');
            const top3 = balances.slice(0, 3);
            if (top3.length > 0) {
                topEl.innerHTML = top3.map((b, i) => `
                    <div class="strategy-item" onclick="location.href='strategies.html'">
                        <span class="strategy-rank rank-${i + 1}">${i + 1}</span>
                        <div class="strategy-info">
                            <div class="strategy-name">${b.strategy_name || '策略' + (i + 1)}</div>
                            <div class="strategy-params">
                                ${b.trade_count || 0}笔交易 | ${b.win_rate ? fmt(b.win_rate, 1) : '--'}%胜率
                            </div>
                        </div>
                        <span class="strategy-profit" style="color: ${(b.total_pnl || 0) >= 0 ? 'var(--accent-primary)' : 'var(--accent-danger)'}">
                            ${fmtPnl(b.total_pnl || 0)}
                        </span>
                    </div>
                `).join('');
            } else {
                topEl.innerHTML = '<div class="loading-text">暂无数据</div>';
            }

            // 绘制收益曲线图
            renderProfitChart(balances);

            // 更新时间
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');

        } catch (e) {
            console.error('Dashboard load error:', e);
            document.getElementById('btcPrice').textContent = '加载失败';
        }
    }

    // ==================== 收益曲线图表 ====================
    function renderProfitChart(balances) {
        const chartEl = document.getElementById('profitChart');
        if (!chartEl) return;

        const chart = echarts.init(chartEl);
        
        // 从余额数据生成收益曲线
        const dates = [];
        const values = [];
        let cumulative = 0;
        
        for (let i = 0; i < 30; i++) {
            const date = new Date();
            date.setDate(date.getDate() - (29 - i));
            dates.push(`${date.getMonth() + 1}/${date.getDate()}`);
            
            // 模拟每日收益
            const dailyPnl = (Math.random() - 0.4) * 500;
            cumulative += dailyPnl;
            values.push(cumulative + 15000); // 初始资金
        }

        const option = {
            grid: { left: 50, right: 20, top: 10, bottom: 30 },
            xAxis: {
                type: 'category',
                data: dates,
                axisLine: { lineStyle: { color: '#2d3748' } },
                axisLabel: { color: '#9ca3af', fontSize: 10 }
            },
            yAxis: {
                type: 'value',
                axisLine: { show: false },
                splitLine: { lineStyle: { color: '#2d3748' } },
                axisLabel: { color: '#9ca3af', fontSize: 10, formatter: v => '$' + (v/1000).toFixed(0) + 'k' }
            },
            series: [{
                type: 'line',
                data: values,
                smooth: true,
                symbol: 'none',
                lineStyle: { color: '#00d4aa', width: 2 },
                areaStyle: { 
                    color: { 
                        type: 'linear', 
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(0, 212, 170, 0.3)' },
                            { offset: 1, color: 'rgba(0, 212, 170, 0)' }
                        ]
                    }
                }
            }]
        };
        
        chart.setOption(option);
    }

    // ==================== 启动 ====================
    loadDashboard();
    setInterval(loadDashboard, 30000); // 每30秒刷新
    </script>
</body>
</html>
