<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .target-section {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 12px;
            margin: 12px 16px;
        }
        .target-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }
        .target-row:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }
        .target-label { color: var(--text-secondary); }
        .target-value { font-weight: 600; }
        .target-value.profit { color: var(--profit); }
        .target-value.loss { color: var(--loss); }

        .mini-account-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mini-account-left {
            flex: 1;
        }
        .mini-account-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .mini-account-info {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .mini-account-info span { margin-right: 12px; }
        .mini-account-right {
            text-align: right;
        }
        .mini-account-pnl {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .mini-account-pct {
            font-size: 11px;
        }
        .mini-account-pct.profit { color: var(--profit); }
        .mini-account-pct.loss { color: var(--loss); }

        .rank-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
        .rank-badge.best { background: rgba(34, 197, 94, 0.2); color: var(--profit); }
        .rank-badge.worst { background: rgba(239, 68, 68, 0.2); color: var(--loss); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>BTC Dashboard</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总盈亏</div>
                        <div class="card-value" id="totalPnl">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">交易数</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">胜率</div>
                        <div class="card-value" id="winRate">--</div>
                    </div>
                </div>
            </section>

            <div class="target-section">
                <div class="target-row">
                    <span class="target-label">目标金额</span>
                    <span class="target-value" id="targetAmount">1,000,000</span>
                </div>
                <div class="target-row">
                    <span class="target-label">收益最高</span>
                    <span class="target-value profit" id="bestStrategy">--</span>
                </div>
                <div class="target-row">
                    <span class="target-label">收益最低</span>
                    <span class="target-value loss" id="worstStrategy">--</span>
                </div>
            </div>

            <section class="strategies-section">
                <div class="section-header"><h2>账户列表</h2></div>
                <div id="strategiesList"><div class="loading-spinner">加载中...</div></div>
            </section>
        </main>

        <div id="tradeModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="back-btn" onclick="closeTradeModal()">← 返回</button>
                    <h2 id="modalTitle">交易记录</h2>
                    <div style="width:50px"></div>
                </div>
                <div id="tradeList"><div class="loading-spinner">加载中...</div></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span>信号</span></a>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        var allTrades = [], strategyStats = [];

        async function loadData() {
            var statusEl = document.getElementById('dbStatus');
            var statusTextEl = document.getElementById('dbStatusText');
            try {
                var trades = await fetchAllTrades();
                if (trades && trades.length > 0) {
                    allTrades = trades.map(function(t) { return enrichTradeWithPnL(t); });
                    strategyStats = transformTradesData(allTrades);
                    statusEl.className = 'status-dot online';
                    statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';
                    updateOverview();
                    updateRankings();
                    renderStrategies();
                } else {
                    useSampleData();
                }
            } catch (error) {
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线';
                useSampleData();
            }
        }

        function useSampleData() {
            strategyStats = SAMPLE_BALANCES;
            allTrades = [];
            updateOverview();
            updateRankings();
            renderStrategies();
            document.getElementById('dbStatusText').textContent = '示例';
        }

        function updateOverview() {
            var totalPnl = 0, totalTrades = allTrades.length, wins = 0;
            allTrades.forEach(function(t) {
                totalPnl += t.realized_pnl || 0;
                if ((t.realized_pnl || 0) > 0) wins++;
            });
            var winRate = totalTrades > 0 ? (wins / totalTrades) * 100 : 0;
            var pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + formatNumber(totalPnl);
            pnlEl.className = 'card-value ' + getPnLClass(totalPnl);
            document.getElementById('totalTrades').textContent = totalTrades;
            document.getElementById('winRate').textContent = winRate.toFixed(1) + '%';
        }

        function updateRankings() {
            if (strategyStats.length === 0) return;
            
            // 按收益率排序
            var sorted = strategyStats.slice().sort(function(a, b) {
                return b.total_pnl_percent - a.total_pnl_percent;
            });
            
            var best = sorted[0];
            var worst = sorted[sorted.length - 1];
            
            document.getElementById('bestStrategy').textContent = best.strategy_name + ' ' + formatPercent(best.total_pnl_percent);
            document.getElementById('worstStrategy').textContent = worst.strategy_name + ' ' + formatPercent(worst.total_pnl_percent);
        }

        function renderStrategies() {
            var container = document.getElementById('strategiesList');
            if (strategyStats.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无数据</div>';
                return;
            }

            // 按收益率排序
            var sorted = strategyStats.slice().sort(function(a, b) {
                return b.total_pnl_percent - a.total_pnl_percent;
            });

            container.innerHTML = sorted.map(function(s, index) {
                var pnlClass = getPnLClass(s.total_pnl);
                var rankBadge = '';
                if (index === 0) {
                    rankBadge = '<span class="rank-badge best">最高</span>';
                } else if (index === sorted.length - 1) {
                    rankBadge = '<span class="rank-badge worst">最低</span>';
                }
                
                return '<div class="mini-account-card" onclick="showTradeModal(\'' + s.strategy_name + '\')">' +
                    '<div class="mini-account-left">' +
                    '<div class="mini-account-name">' + s.strategy_name + rankBadge + '</div>' +
                    '<div class="mini-account-info">' +
                    '<span>余额: ' + formatNumber(s.balance) + '</span>' +
                    '<span>交易: ' + s.trade_count + '</span>' +
                    '<span>胜率: ' + s.win_rate.toFixed(0) + '%</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="mini-account-right">' +
                    '<div class="mini-account-pnl ' + pnlClass + '">' + (s.total_pnl >= 0 ? '+' : '') + formatNumber(s.total_pnl) + '</div>' +
                    '<div class="mini-account-pct ' + pnlClass + '">' + formatPercent(s.total_pnl_percent) + '</div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function showTradeModal(strategyName) {
            var modal = document.getElementById('tradeModal');
            document.getElementById('modalTitle').textContent = strategyName;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            var trades = allTrades.filter(function(t) {
                return (t.strategy || t.account_id || 'Unknown') === strategyName;
            });
            var list = document.getElementById('tradeList');
            if (trades.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无交易记录</div>';
                return;
            }
            list.innerHTML = trades.slice(0, 50).map(function(t) {
                var side = (t.side || '--').toUpperCase();
                var sideClass = (side === 'LONG' || side === 'BUY') ? 'long' : ((side === 'SHORT' || side === 'SELL') ? 'short' : '');
                var pnlClass = getPnLClass(t.realized_pnl);
                var date = t.opened_at ? t.opened_at.replace('T', ' ').substring(0, 16) : '--';
                return '<div class="trade-item">' +
                    '<div class="trade-header">' +
                    '<span class="trade-type ' + sideClass + '">' + side + '</span>' +
                    '<span class="trade-pnl ' + pnlClass + '">' + (t.realized_pnl >= 0 ? '+' : '') + formatNumber(t.realized_pnl) + '</span>' +
                    '</div>' +
                    '<div class="trade-details">' +
                    '<div>开仓: <span>' + formatNumber(t.entry_price) + '</span></div>' +
                    '<div>平仓: <span>' + formatNumber(t.close_price) + '</span></div>' +
                    '<div>数量: <span>' + formatNumber(t.size, 4) + '</span></div>' +
                    '<div>杠杆: <span>' + (t.leverage || 0) + 'x</span></div>' +
                    '</div>' +
                    '<div class="trade-time">' + date + '</div>' +
                    '</div>';
            }).join('');
        }

        function closeTradeModal() {
            document.getElementById('tradeModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
