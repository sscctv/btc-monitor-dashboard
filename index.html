<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 交易监控</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f0f1a; color: #fff; }
.green { color: #2ecc71; }
.red { color: #e74c3c; }
.yellow { color: #f1c40f; }
.cyan { color: #00d4ff; }

/* Tab Bar */
.tab-bar { display: flex; background: #1a1a2e; border-bottom: 2px solid #333; }
.tab-btn { flex: 1; padding: 16px 0; text-align: center; font-size: 1.05rem; font-weight: bold; color: #555; cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #00d4ff; border-bottom-color: #00d4ff; }
.tab-content { display: none; padding: 10px; }
.tab-content.active { display: block; }

/* Market */
.card { background: #1a1a2e; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.price { font-size: 2.2rem; color: #00d4ff; text-align: center; }
.label { color: #888; font-size: 0.75rem; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
.b-wait { background: #333; color: #888; }
.b-long { background: rgba(39,174,96,0.3); color: #2ecc71; }
.b-short { background: rgba(231,76,60,0.3); color: #e74c3c; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
.cell { background: #16213e; border-radius: 6px; padding: 8px; text-align: center; cursor: pointer; }
.cell:hover { background: #1e3050; }
.cell-label { font-size: 0.55rem; color: #666; }
.cell-value { font-size: 0.9rem; font-weight: bold; margin-top: 2px; }
.time { text-align: center; color: #555; font-size: 0.65rem; margin-top: 8px; }

/* Account Header */
.acc-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #1a1a2e; border-radius: 10px; margin-bottom: 6px; }
.acc-header.real { border: 1px solid #c9920b; border-left: 4px solid #f39c12; }
.acc-name { font-size: 1rem; font-weight: bold; }
.acc-name span { font-size: 0.7rem; color: #666; margin-left: 6px; }
.acc-total { font-size: 1rem; font-weight: bold; text-align: right; }
.acc-total.pos { color: #2ecc71; }
.acc-total.neg { color: #e74c3c; }
.acc-total.zero { color: #555; }
.acc-sub { font-size: 0.65rem; color: #666; margin-top: 2px; text-align: right; }
.acc-sub span { color: #fff; }

/* Position Table */
.pos-table { background: #16213e; border-radius: 8px; overflow: hidden; margin-bottom: 6px; }
.pos-dir { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #1e2a3a; }
.pos-dir.long { border-left: 3px solid #2ecc71; }
.pos-dir.short { border-left: 3px solid #e74c3c; }
.pos-dir-label { font-size: 0.82rem; font-weight: bold; }
.pos-dir-label.long { color: #2ecc71; }
.pos-dir-label.short { color: #e74c3c; }
.pos-pnl { font-size: 0.9rem; font-weight: bold; }
.pos-pnl.pos { color: #2ecc71; }
.pos-pnl.neg { color: #e74c3c; }
.pos-pnl.zero { color: #555; }

.pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: #111; }
.pos-cell { background: #16213e; padding: 7px 10px; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 2px; }
.pos-cell:last-child { border-bottom: none; }
.pos-cell-label { font-size: 0.58rem; color: #555; }
.pos-cell-value { font-size: 0.82rem; color: #fff; font-weight: 500; }
.pos-cell-value.pos { color: #2ecc71; }
.pos-cell-value.neg { color: #e74c3c; }
.pos-cell-value.cyan { color: #00d4ff; }
.pos-cell-value.yellow { color: #f1c40f; }

.acc-idle { color: #555; font-size: 0.85rem; padding: 8px 12px; background: #16213e; border-radius: 8px; text-align: center; }
.acc-idle span { color: #fff; font-weight: bold; }
.no-data { text-align: center; color: #444; font-size: 0.8rem; padding: 20px; }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.hide { display: none; }
.modal-box { background: #1a1a2e; border-radius: 14px; max-width: 340px; width: 100%; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #16213e; border-bottom: 1px solid #333; }
.modal-title { font-size: 1rem; font-weight: bold; color: #00d4ff; }
.modal-close { background: none; border: none; color: #666; font-size: 1.4rem; cursor: pointer; }
.modal-body { padding: 14px 16px; font-size: 0.82rem; line-height: 1.6; color: #aaa; }
.modal-footer { padding: 10px 16px; border-top: 1px solid #333; font-size: 0.7rem; color: #555; text-align: center; }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" id="btn-market" onclick="switchTab('market')">📊 行情</button>
  <button class="tab-btn" id="btn-accounts" onclick="switchTab('accounts')">📱 账号</button>
  <button class="tab-btn" id="btn-virt" onclick="switchTab('virt')">🎮 虚拟</button>
</div>

<div id="tab-market" class="tab-content active">
  <div class="card">
    <div class="label">BTC-USD-SWAP</div>
    <div class="price" id="price">--</div>
    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#888;margin-top:4px">
      <span>24h低 <span id="low24">--</span></span>
      <span>24h高 <span id="high24">--</span></span>
    </div>
  </div>

  <div class="card" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="showSignalModal()">
    <span id="signal">等待信号</span>
    <span class="badge b-wait" id="badge">等待</span>
  </div>

  <div class="card">
    <div class="label">多空偏向</div>
    <div id="biasText" style="text-align:center;font-size:0.85rem;margin-top:4px">中性 50%</div>
    <div style="height:8px;background:#333;border-radius:4px;margin-top:6px;overflow:hidden">
      <div id="biasBar" style="width:50%;height:100%;background:linear-gradient(90deg,#27ae60,#2ecc71);transition:width 0.3s"></div>
    </div>
  </div>

  <div class="card">
    <div class="label">技术指标</div>
    <div class="grid">
      <div class="cell" onclick="showModal('rsi')"><div class="cell-label">RSI</div><div class="cell-value" id="rsi">--</div></div>
      <div class="cell" onclick="showModal('adx')"><div class="cell-label">ADX</div><div class="cell-value" id="adx">--</div></div>
      <div class="cell" onclick="showModal('macd')"><div class="cell-label">MACD</div><div class="cell-value" id="macd">--</div></div>
      <div class="cell" onclick="showModal('cvd')"><div class="cell-label">CVD</div><div class="cell-value" id="cvd">--</div></div>
      <div class="cell" onclick="showModal('funding')"><div class="cell-label">资金费率</div><div class="cell-value" id="funding">--</div></div>
      <div class="cell" onclick="showModal('atr')"><div class="cell-label">ATR</div><div class="cell-value" id="atr">--</div></div>
      <div class="cell" onclick="showModal('book')"><div class="cell-label">买卖盘</div><div class="cell-value" id="book">--</div></div>
      <div class="cell" onclick="showModal('spread')"><div class="cell-label">价差</div><div class="cell-value" id="spread">--</div></div>
      <div class="cell" onclick="showModal('sentiment')"><div class="cell-label">情绪</div><div class="cell-value" id="sentiment">--</div></div>
      <div class="cell" onclick="showModal('harvest')"><div class="cell-label">收割预警</div><div class="cell-value" id="harvest">--</div></div>
      <div class="cell" onclick="showModal('oi')"><div class="cell-label">OI持仓量</div><div class="cell-value" id="oi">--</div></div>
      <div class="cell" onclick="showModal('oinew')"><div class="cell-label">OI信号</div><div class="cell-value" id="oinew">--</div></div>
      <div class="cell" onclick="showModal('nextfunding')"><div class="cell-label">下次结算</div><div class="cell-value" id="nextfunding">--</div></div>
    </div>
  </div>

  <div class="card">
    <div class="label">市场状态</div>
    <div style="display:flex;justify-content:space-around;margin-top:8px">
      <div style="text-align:center"><div class="label">状态</div><div id="state" style="color:#3498db">--</div></div>
      <div style="text-align:center"><div class="label">方向</div><div id="dir">--</div></div>
      <div style="text-align:center"><div class="label">趋势</div><div id="trend">--</div></div>
    </div>
  </div>

  <div class="card">
    <div class="label">订单簿 <span id="ob-spread" style="font-size:0.7rem;color:#888;font-weight:normal">价差 $--</span></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <div style="flex:1">
        <div style="font-size:0.65rem;color:#27ae60;margin-bottom:3px">买盘</div>
        <div id="ob-bids" style="font-size:0.7rem"></div>
      </div>
      <div style="flex:1">
        <div style="font-size:0.65rem;color:#e74c3c;margin-bottom:3px">卖盘</div>
        <div id="ob-asks" style="font-size:0.7rem"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label">信号记录</div>
    <div id="sig-history" style="font-size:0.75rem;color:#888;padding:4px 0">暂无记录</div>
  </div>

  <div class="time">最后更新: <span id="update">--</span></div>
</div>

<div id="tab-virt" class="tab-content">
  <div id="virt-list"></div>
  <div class="time">最后更新: <span id="virt-update">--</span></div>
</div>

<div id="tab-accounts" class="tab-content">
  <div id="acc-list"></div>
  <div class="time">最后更新: <span id="acc-update">--</span></div>
</div>

<div id="modal" class="modal-overlay hide" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">--</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">点击外部区域关闭</div>
  </div>
</div>

<script>
const SB_URL = 'https://lpcrnobolifrzwrkxoli.supabase.co';
const SB_KEY = 'sb_publishable_8gEsCRNRc7py6BmypYuRIw_sNtKooug';

var INDICATOR_INFO = {
  rsi: { name: 'RSI 相对强弱指数', desc: '衡量价格变动的速度与幅度，判断是否超买或超卖。', details: ['<strong>0-30</strong>：超卖，可能止跌反弹','<strong>30-50</strong>：偏弱，趋势向下','<strong>50-70</strong>：偏强，趋势向上','<strong>70-100</strong>：超买，可能回落'], tip: 'RSI > 70 超买（可能下跌），RSI < 30 超卖（可能上涨）' },

  macd: { name: 'MACD', desc: '由快线、慢线和柱状图组成，判断趋势方向与动能。', details: ['<strong>↑ DIF在DEA上方</strong>：多头信号','<strong>↓ DIF在DEA下方</strong>：空头信号','<strong>柱状图放大</strong>：动能增强','<strong>柱状图缩小</strong>：动能减弱'], tip: '只看快线方向和柱状图颜色即可判断多空' },
  cvd: { name: 'CVD 累积成交量差', desc: '多空成交量累积量差，跟踪主力资金倾向。', details: ['<strong>CVD 上升</strong>：多头占优','<strong>CVD 下降</strong>：空头占优','<strong>CVD 背离价格</strong>：重要预警','价格创新高但CVD未跟上 → 可能见顶'], tip: 'CVD 比价格先行，是判断顶底的重要指标' },
  funding: { name: '资金费率', desc: '永续合约多空双方定期交换的费用，正值多头付空头。', details: ['<strong>> 0</strong>：多头资金费率','<strong>< 0</strong>：空头资金费率','<strong>> 0.5%/8h</strong>：极端费率预警','<strong>接近0</strong>：多空平衡'], tip: '资金费率持续偏高，往往是顶部预警信号' },

  book: { name: '买卖盘', desc: '盘口买卖盘深度对比，反映即时多空力量。', details: ['<strong>买盘 > 卖盘</strong>：买方更积极','<strong>卖盘 > 买盘</strong>：卖方更积极','差值越大，多空分歧越激烈','仅反映挂单量，不反映真实成交意愿'], tip: '作为辅助参考，不建议单独作为交易依据' },
  spread: { name: '价差', desc: '盘口最优卖价与买价的差值，反映流动性成本。', details: ['<strong>$0.1 以下</strong>：流动性好','<strong>$0.1-$0.5</strong>：正常范围','<strong>> $1</strong>：流动性差，滑点风险大','极端价差往往在市场剧烈波动时出现'], tip: '价差突然扩大 = 市场流动性紧张，谨慎开仓' },
  sentiment: { name: '新闻情绪', desc: 'AI分析新闻情绪对BTC影响，正值利多，负值利空。', details: ['<strong>利多</strong>：新闻偏利好','<strong>利空</strong>：新闻偏利空','<strong>中性</strong>：无明显倾向','由GROQ AI每6分钟分析一次'], tip: '情绪分析仅供参考，不作为交易依据' },
  harvest: { name: '收割预警', desc: '资金费率异常预警，极端费率往往伴随趋势顶底。', details: ['<strong>正常</strong>：|费率| < 0.2%/8h','<strong>警告</strong>：|费率| 0.2-0.5%/8h','<strong>危险</strong>：|费率| > 0.5%/8h','极端费率往往是行情即将反转的信号'], tip: '高资金费率预警 = 警惕顶部风险，低费率可作为做多参考' },

function showModal(key) {
  var info = INDICATOR_INFO[key];
  if (!info) return;
  document.getElementById('modal-title').textContent = info.name;
  var body = document.getElementById('modal-body');
  var html = '<p style="color:#888;margin-bottom:10px">' + info.desc + '</p>';
  html += '<div style="margin:8px 0">' + info.details.map(d => '<div style="margin-bottom:4px">' + d + '</div>').join('') + '</div>';
  html += '<div style="background:#16213e;border-radius:8px;padding:10px;margin-top:10px;font-size:0.78rem;color:#00d4ff">💡 ' + info.tip + '</div>';
  body.innerHTML = html;
  document.getElementById('modal').classList.remove('hide');
}
function closeModal() { document.getElementById('modal').classList.add('hide'); }

function showSignalModal() {
  var m = window._curMarket || {};
  var mode = m.mode || 'wait';
  var score = Number(m.signal_score || 0);
  var adx = Number(m.adx || 0);
  var rsi = Number(m.rsi || 50);
  var depth = Number(m.depth_ratio_5 || 1);
  var bigNet = Number(m.big_trade_net || 0);
  var funding = Number(m.funding_rate || 0);
  var sentiment = m.sentiment || {};
  var sd = Number(m.score_depth || 0);
  var sb = Number(m.score_big || 0);
  var sf = Number(m.score_fund || 0);
  var sr = Number(m.score_rsi || 0);
  var sm = Number(m.score_macd || 0);
  var sc = Number(m.score_cvd || 0);
  var adxMult = Number(m.adx_mult || 1.0);
  var macdVal = Number(m.macd || 0);
  var cvdVal = Number(m.cvd || 0);

  var modeNames = {
    'long': '做多 🟢', 'short': '做空 🔴',
    'long_pending': '等待做多 🟡', 'short_pending': '等待做空 🟡',
    'wait': '等待信号 ⏸️'
  };
  var modeName = modeNames[mode] || mode;

  var depthTip = depth > 2.0 ? '买盘强势' : depth < 0.5 ? '卖盘强势' : '中性';
  var bigTip = bigNet > 3 ? '大单净买入' : bigNet < -3 ? '大单净卖出' : '大单中性';
  var fundTip = funding > 0.0001 ? '多头付钱（利空）' : funding < -0.0001 ? '空头付钱（利多）' : '费率中性';
  var rsiTip = rsi > 70 ? '超买' : rsi < 30 ? '超卖' : rsi > 60 ? '偏多' : rsi < 40 ? '偏空' : '中性';
  var macdTip = macdVal > 0 ? '做多动能' : '做空动能';
  var cvdTip = cvdVal > 0 ? '成交量偏多' : '成交量偏空';

  var missing = [];
  if (mode.includes('pending')) {
    if (adx < 20) missing.push('ADX < 20（趋势不明确）');
    if (score > 0 && score < 0.35) missing.push('评分需达 +0.35（当前 ' + score.toFixed(2) + '）');
    if (score < 0 && score > -0.35) missing.push('评分需达 -0.35（当前 ' + score.toFixed(2) + '）');
  }
  if (mode === 'wait' && Math.abs(score) <= 0.25) missing.push('评分需突破 ±0.25（当前 ' + score.toFixed(2) + '）');
  if (adx < 20) missing.push('ADX < 20（震荡市，信号打折）');

  var html = '<div style="margin-bottom:12px">';
  html += '<div style="font-size:1.1rem;font-weight:bold;color:#00d4ff;margin-bottom:6px">' + modeName + '</div>';
  html += '<div style="color:#888;font-size:0.8rem">综合评分: <span style="color:' + (score >= 0 ? '#2ecc71' : '#e74c3c') + ';font-weight:bold">' + (score >= 0 ? '+' : '') + score.toFixed(2) + '</span> <span style="color:#888">/ ±0.35 确认 / ±0.15 观望</span></div>';
  html += '</div>';

  html += '<div style="background:#16213e;border-radius:8px;padding:10px;margin-bottom:10px">';
  html += '<div style="color:#888;font-size:0.72rem;margin-bottom:6px">评分构成（6指标 + ADX加权）</div>';
  var items = [
    ['📐 深度', '20%', sd, '深度比 ' + depth.toFixed(2) + '，' + depthTip],
    ['📊 大单', '20%', sb, '大单净流向 ' + bigNet + '，' + bigTip],
    ['💰 费率', '10%', sf, '费率 ' + (funding * 100).toFixed(4) + '%，' + fundTip],
    ['📉 RSI', '10%', sr, 'RSI ' + rsi.toFixed(0) + '，' + rsiTip],
    ['📈 MACD', '10%', sm, 'MACD ' + macdVal.toFixed(2) + '，' + macdTip],
    ['📊 CVD', '10%', sc, 'CVD ' + cvdVal.toFixed(1) + '，' + cvdTip],
  ];
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var val = it[2];
    var col = val > 0 ? '#2ecc71' : val < 0 ? '#e74c3c' : '#888';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;font-size:0.78rem">';
    html += '<span style="color:#aaa">' + it[0] + ' <span style="color:#555;font-size:0.65rem">(' + it[1] + ')</span></span>';
    html += '<span style="color:' + col + ';font-weight:bold">' + (val >= 0 ? '+' : '') + val.toFixed(3) + '</span></div>';
    html += '<div style="font-size:0.65rem;color:#555;margin-bottom:5px;margin-left:60px">' + it[3] + '</div>';
  }
  html += '</div>';

  html += '<div style="margin-bottom:10px;font-size:0.8rem">';
  html += '<div style="color:#888;margin-bottom:4px">ADX 趋势强度: <span style="color:' + (adx >= 25 ? '#2ecc71' : adx >= 20 ? '#f39c12' : '#e74c3c') + ';font-weight:bold">' + adx.toFixed(1) + '</span>';
  html += ' <span style="font-size:0.7rem;color:#888">×' + adxMult.toFixed(1) + '权重</span></div>';
  html += '<div style="font-size:0.72rem;color:#555">' + (adx >= 25 ? '✅ ADX≥25 趋势明确，信号正常' : adx >= 20 ? '⚠️ ADX 20-25 趋势初现，信号×0.8' : '❌ ADX<20 震荡市，信号×0.5') + '</div>';
  html += '</div>';

  if (missing.length > 0) {
    html += '<div style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:10px">';
    html += '<div style="color:#f39c12;font-size:0.78rem;font-weight:bold;margin-bottom:6px">⏳ 等待以下条件达成:</div>';
    for (var j = 0; j < missing.length; j++) {
      html += '<div style="color:#f39c12;font-size:0.75rem;margin-bottom:3px">• ' + missing[j] + '</div>';
    }
    html += '</div>';
  }

  if (sentiment && sentiment['情绪']) {
    html += '<div style="font-size:0.78rem;color:#aaa;margin-bottom:4px">情绪: <span style="color:#00d4ff">' + sentiment['情绪'] + '</span></div>';
    html += '<div style="font-size:0.72rem;color:#555">' + (sentiment['理由'] || '') + '</div>';
  }

  document.getElementById('modal-title').textContent = '📊 信号分析';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.remove('hide');
}

function switchTab(tab) {

function fmt(n, d=1) { return n != null && !isNaN(n) ? n.toFixed(d) : '--'; }
function fmtP(n) { return n != null && !isNaN(n) ? Math.round(n).toLocaleString() : '--'; }

function calcSignal(rsi, adx, trend, market_state, macd, signal, cvd) {
  var isTrending = (market_state === 'trend' || market_state === 'strong_trend');
  
  // 强趋势做多: ADX>=25 + MACD金叉 + RSI 60-75 + CVD正
  if (isTrending && trend === 'bullish' && adx >= 25) {
    if (macd > signal && rsi >= 60 && rsi < 75 && cvd > 0) {
      return { signal: '做多信号 🟢', badge: 'b-long', color: '#2ecc71' };
    }
    if (rsi >= 75 && cvd < 0) {
      return { signal: '超买警告 ⚠️', badge: 'b-short', color: '#e74c3c' };
    }
  }
  
  // 强趋势做空: ADX>=25 + MACD死叉 + RSI 25-40 + CVD负
  if (isTrending && trend === 'bearish' && adx >= 25) {
    if (macd < signal && rsi <= 40 && rsi > 25 && cvd < 0) {
      return { signal: '做空信号 🔴', badge: 'b-short', color: '#e74c3c' };
    }
    if (rsi <= 25 && cvd > 0) {
      return { signal: '超卖警告 ⚠️', badge: 'b-long', color: '#2ecc71' };
    }
  }
  
  // 震荡行情（ADX < 25）: 无趋势信号
  if (adx < 25) {
    if (rsi < 35) return { signal: '超卖观察 🔵', badge: 'b-long', color: '#3498db' };
    if (rsi > 65) return { signal: '超买观察 🔴', badge: 'b-short', color: '#e74c3c' };
    return { signal: '等待信号 ⏸️', badge: 'b-wait', color: '#888' };
  }
  
  // 有趋势但无确认
  if (trend === 'bearish') return { signal: '等待做空 ⏸️', badge: 'b-wait', color: '#888' };
  if (trend === 'bullish') return { signal: '等待做多 ⏸️', badge: 'b-wait', color: '#888' };
  
  return { signal: '等待信号 ⏸️', badge: 'b-wait', color: '#888' };
}

function calcSignalFromScore(mode, score, adx) {
  if (mode === 'long') return { signal: '做多信号 🟢', badge: 'b-long', color: '#2ecc71' };
  if (mode === 'short') return { signal: '做空信号 🔴', badge: 'b-short', color: '#e74c3c' };
  if (mode === 'long_pending') return { signal: '等待做多 🟡', badge: 'b-pending', color: '#f39c12' };
  if (mode === 'short_pending') return { signal: '等待做空 🟡', badge: 'b-pending', color: '#f39c12' };
  if (adx < 20) return { signal: '震荡整理 🔵', badge: 'b-wait', color: '#888' };
  return { signal: '等待信号 ⏸️', badge: 'b-wait', color: '#888' };
}

        if (h.mode === 'long') return '#2ecc71';

      if (ordered.indexOf(accs[j]) < 0) ordered.push(accs[j]);
    }

    for (var i = 0; i < ordered.length; i++) {
      var acc = ordered[i];

      var isReal = accName === 'Real';
      var bal = Number(acc.balance || 0);

      if (!isIdle && side) {
        var sideLabel = side === 'long' ? '做多' : side === 'short' ? '做空' : side;
        var pnlClass2 = upl > 0.005 ? 'pos' : upl < -0.005 ? 'neg' : 'zero';
        html += '<div class="pos-table">';
        html += '<div class="pos-dir ' + side + '">';
        html += '<div class="pos-dir-label ' + side + '">' + sideLabel + ' ×' + size + '张</div>';
        html += '<div class="pos-pnl ' + pnlClass2 + '">' + (upl >= 0 ? '+' : '') + fmt(upl, 2) + 'U</div>';
        html += '</div>';
        html += '<div class="pos-grid">';
        html += '<div class="pos-cell"><div class="pos-cell-label">开仓均价</div><div class="pos-cell-value">$' + fmtP(entry) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">当前价</div><div class="pos-cell-value cyan">$' + fmtP(price) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">预估强平价</div><div class="pos-cell-value yellow">' + (sl > 0 ? '$' + fmtP(sl) : '--') + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">浮动盈亏</div><div class="pos-cell-value ' + pnlClass2 + '">' + (upl >= 0 ? '+' : '') + fmt(upl, 2) + '</div></div>';
        html += '</div></div>';
      }

      if (isIdle) {
        html += '<div class="acc-idle">空闲 · 本金 <span>' + fmt(bal, 2) + 'U</span></div>';
      }

      html += '</div>';
    }

    if (!html) html = '<div class="no-data">暂无账号数据</div>';
    document.getElementById('acc-list').innerHTML = html;
    document.getElementById('acc-update').textContent = now;

  } catch(e) { console.log('Load error:', e); }
}

        html += '<div class="pos-dir ' + a.side + '">';
        html += '<div class="pos-dir-label ' + a.side + '">' + (isLong ? '做多' : '做空') + ' ×' + (a.leverage || 100) + ' ' + (a.size || 0) + '张</div>';
        html += '<div class="pos-pnl ' + pnlClass + '">' + (pnl >= 0 ? '+' : '') + fmt(pnl, 2) + 'U</div>';
        html += '</div>';
        
        html += '<div class="pos-grid">';
        html += '<div class="pos-cell"><div class="pos-cell-label">开仓均价</div><div class="pos-cell-value">$' + fmtP(a.entry) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">当前价</div><div class="pos-cell-value cyan">$' + fmtP(a.current) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">偏离</div><div class="pos-cell-value ' + pnlClass + '">' + fmt(a.profit_pct, 3) + '%</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">状态</div><div class="pos-cell-value">' + a.status + '</div></div>';
        html += '</div></div>';
      } else {
        html += '<div class="acc-idle">空仓 · 本金 <span>' + fmt(a.balance, 2) + 'U</span></div>';
      }
      
      html += '</div>';
    }
    
    if (!html) html = '<div class="no-data">暂无虚拟账号数据</div>';
    document.getElementById('virt-list').innerHTML = html;
    document.getElementById('virt-update').textContent = data.updated_at || '--';
  } catch(e) { console.log('Virt load error:', e); }
}

load();
setInterval(load, 15000);
setInterval(loadVirt, 10000);
</script>
</body>
</html>
