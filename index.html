<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BTC 智能交易监控</title>
<style>
:root {
  --bg: #0a0a14;
  --card: #111827;
  --border: #1f2937;
  --text: #e5e7eb;
  --dim: #6b7280;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --cyan: #06b6d4;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

.header { text-align: center; padding: 16px 12px 8px; border-bottom: 1px solid var(--border); }
.header h1 { color: var(--cyan); font-size: 1.1rem; font-weight: 600; }
.header .sub { color: var(--dim); font-size: 0.65rem; margin-top: 4px; }

/* 价格卡片 */
.price-card { margin: 12px 10px; background: var(--card); border-radius: 16px; padding: 16px; text-align: center; }
.price-card .price { font-size: 2rem; font-weight: 700; color: var(--cyan); font-family: 'SF Mono', monospace; }
.price-card .signal-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.bg-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid var(--green); }
.bg-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid var(--red); }
.bg-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid var(--yellow); }
.bg-gray { background: rgba(107,114,128,0.15); color: var(--dim); border: 1px solid var(--dim); }

/* 指标网格 */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 0 10px 10px; }
.metric { background: var(--card); border-radius: 12px; padding: 10px 6px; text-align: center; }
.metric .label { color: var(--dim); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.metric .val { font-size: 0.95rem; font-weight: 700; }
.metric .sub { font-size: 0.6rem; color: var(--dim); margin-top: 2px; }

/* 信号详情 */
.detail-card { margin: 0 10px 10px; background: var(--card); border-radius: 12px; padding: 12px; }
.detail-card .title { color: var(--cyan); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.detail-row:last-child { border-bottom: none; }
.detail-row .label { color: var(--dim); }
.detail-row .val { font-weight: 600; }
.detail-desc { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: 8px; font-size: 0.7rem; color: var(--dim); line-height: 1.5; }

/* 账户 */
.section-title { color: var(--cyan); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin: 14px 10px 6px; }
.acc-card { margin: 0 10px 8px; background: var(--card); border-radius: 12px; padding: 12px; border-left: 3px solid var(--cyan); }
.acc-card.long { border-color: var(--green); }
.acc-card.short { border-color: var(--red); }
.acc-header { display: flex; justify-content: space-between; align-items: center; }
.acc-name { font-weight: 700; font-size: 0.95rem; }
.acc-strategy { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }
.acc-pnl { font-size: 1.1rem; font-weight: 700; }
.acc-balance { font-size: 0.65rem; color: var(--dim); text-align: right; margin-top: 2px; }
.acc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.acc-stat { background: var(--bg); border-radius: 8px; padding: 6px; text-align: center; }
.acc-stat .l { color: var(--dim); font-size: 0.55rem; text-transform: uppercase; }
.acc-stat .v { font-size: 0.8rem; font-weight: 700; margin-top: 2px; }
.acc-status-badge { display: inline-block; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }

/* 预警 */
.alert-card { margin: 0 10px 8px; background: var(--card); border-radius: 12px; padding: 10px 12px; border-left: 3px solid; }
.alert-card.critical { border-color: var(--red); }
.alert-card.warning { border-color: var(--yellow); }
.alert-card.info { border-color: var(--blue); }
.alert-time { font-size: 0.6rem; color: var(--dim); }
.alert-msg { font-size: 0.8rem; margin-top: 2px; }

/* 底部 */
.footer { text-align: center; color: var(--dim); font-size: 0.6rem; padding: 16px; }
.live-dot { display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; margin-right: 4px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.status-bar { display: flex; justify-content: center; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--dim); margin-top: 4px; }

/* 加载 */
.loading { text-align: center; color: var(--dim); padding: 40px; font-size: 0.8rem; }

/* 移动适配 */
@media (max-width: 400px) {
  .metrics { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .metric .val { font-size: 0.85rem; }
  .price-card .price { font-size: 1.7rem; }
}
@media (min-width: 600px) {
  body { max-width: 600px; margin: 0 auto; }
  .header { padding: 20px 16px 12px; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 BTC 智能交易监控</h1>
  <div class="status-bar"><span class="live-dot"></span>实时 · 5秒刷新</div>
</div>

<div class="price-card">
  <div class="price" id="price">--</div>
  <div class="signal-row" id="signal-row">
    <span class="badge bg-gray">等待信号</span>
  </div>
</div>

<div class="metrics">
  <div class="metric">
    <div class="label">评分</div>
    <div class="val" id="score">--</div>
  </div>
  <div class="metric">
    <div class="label">RSI</div>
    <div class="val" id="rsi">--</div>
    <div class="sub" id="rsi-hint"></div>
  </div>
  <div class="metric">
    <div class="label">ADX</div>
    <div class="val" id="adx">--</div>
    <div class="sub" id="adx-hint"></div>
  </div>
  <div class="metric">
    <div class="label">深度比</div>
    <div class="val" id="depth">--</div>
  </div>
</div>

<div class="detail-card">
  <div class="title">📈 综合信号</div>
  <div class="detail-row"><span class="label">大单净流向</span><span class="val" id="big-net">--</span></div>
  <div class="detail-row"><span class="label">资金费率</span><span class="val" id="funding-rate">--</span></div>
  <div class="detail-row"><span class="label">24h 高</span><span class="val" id="high24h">--</span></div>
  <div class="detail-row"><span class="label">24h 低</span><span class="val" id="low24h">--</span></div>
  <div class="detail-row"><span class="label">市场情绪</span><span class="val" id="sentiment">--</span></div>
  <div class="detail-desc" id="sig-desc">加载中...</div>
</div>

<div class="section-title">💼 账户</div>
<div id="acc-container"><div class="loading">加载中...</div></div>

<div class="footer">
  <div>最后更新: <span id="last-update">--</span></div>
</div>

<script>
const STORAGE_URL = 'https://lpcrnobolifrzwrkxoli.supabase.co/storage/v1/object/public/virt-data/market_data.json';

const $ = id => document.getElementById(id);

function f(n, d=2) { return n != null && !isNaN(n) ? Number(n).toFixed(d) : '--'; }
function fp(n) { return n != null && !isNaN(n) ? Number(n).toLocaleString() : '--'; }
function cl(val, gt, lt) { return val > gt ? 'green' : val < lt ? 'red' : 'dim'; }
function clv(val) { return val > 0 ? 'green' : val < 0 ? 'red' : 'dim'; }

function badge(mode) {
  if (mode === 'long') return '<span class="badge bg-green">做多 🟢</span>';
  if (mode === 'short') return '<span class="badge bg-red">做空 🔴</span>';
  if (mode === 'long_pending') return '<span class="badge bg-yellow">等待做多 🟡</span>';
  if (mode === 'short_pending') return '<span class="badge bg-yellow">等待做空 🟡</span>';
  return '<span class="badge bg-gray">等待 ⏸️</span>';
}

function accBadge(side) {
  if (side === 'long') return '<span class="badge bg-green" style="font-size:0.55rem">多单</span>';
  if (side === 'short') return '<span class="badge bg-red" style="font-size:0.55rem">空单</span>';
  return '<span class="badge bg-gray" style="font-size:0.55rem">空仓</span>';
}

async function loadData() {
  let data = null;
  try {
    const res = await fetch(STORAGE_URL + '?t=' + Date.now());
    if (res.ok) data = await res.json();
  } catch(e) { console.log('fetch error', e); }
  
  if (!data || !data.market) {
    $('price').textContent = '加载失败';
    return;
  }
  
  const m = data.market;
  const sc = Number(m.signal_score || 0);
  const rsi = Number(m.rsi || 50);
  const adx = Number(m.adx || 25);
  const dr = Number(m.depth_ratio_5 || 1);
  const bn = Number(m.big_trade_net || 0);
  const fr = Number(m.funding_rate || 0);
  
  $('price').textContent = '$' + fp(m.price);
  $('signal-row').innerHTML = badge(m.mode);
  $('score').textContent = (sc >= 0 ? '+' : '') + f(sc, 2);
  $('score').className = 'val ' + clv(sc);
  
  $('rsi').textContent = f(rsi, 1);
  $('rsi').className = 'val ' + cl(rsi, 65, 35);
  $('rsi-hint').textContent = rsi > 65 ? '超买' : rsi < 35 ? '超卖' : '';
  
  $('adx').textContent = f(adx, 1);
  $('adx').className = 'val ' + (adx >= 25 ? 'green' : 'dim');
  $('adx-hint').textContent = adx >= 25 ? '趋势' : '震荡';
  
  $('depth').textContent = f(dr, 2);
  $('depth').className = 'val ' + cl(dr, 2, 0.5);
  
  $('big-net').textContent = (bn >= 0 ? '+' : '') + bn + ' 笔';
  $('big-net').className = 'val ' + clv(bn > 0 ? 1 : bn < 0 ? -1 : 0);
  
  $('funding-rate').textContent = (fr * 100).toFixed(4) + '%';
  
  const h = Number(m.high24h || 0), l = Number(m.low24h || 0);
  $('high24h').textContent = h ? '$' + fp(h) : '--';
  $('low24h').textContent = l ? '$' + fp(l) : '--';
  
  let sent = m.sentiment;
  if (sent && typeof sent === 'object') sent = sent['情绪'];
  $('sentiment').textContent = sent || '--';
  
  $('sig-desc').innerHTML = `<b>${m.mode}</b> · 评分 <b>${(sc>=0?'+':'') + f(sc,2)}</b> · ${sent || ''} · ${m.last_update || ''}`;
  
  // 账户
  const accs = data.accounts || [];
  if (accs.length > 0) {
    let html = '';
    for (const a of accs) {
      const pnl = Number(a.unrealized_pnl || 0);
      const bal = Number(a.balance || 0);
      const side = a.side;
      const hasPos = side && a.size > 0;
      const cardClass = side === 'long' ? 'long' : side === 'short' ? 'short' : '';
      html += `<div class="acc-card ${cardClass}">`;
      html += `<div class="acc-header">`;
      html += `<div><div class="acc-name">${a.account || ''}</div><div class="acc-strategy">${a.strategy || ''}</div>${accBadge(side)}</div>`;
      html += `<div style="text-align:right"><div class="acc-pnl ${pnl>=0?'green':'red'}">${pnl>=0?'+':''}${f(pnl,2)}U</div><div class="acc-balance">余额 ${f(bal,2)}U</div></div>`;
      html += `</div>`;
      if (hasPos) {
        html += `<div class="acc-grid">`;
        html += `<div class="acc-stat"><div class="l">持仓</div><div class="v">${f(a.size,4)}</div></div>`;
        html += `<div class="acc-stat"><div class="l">均价</div><div class="v">$${fp(a.entry)}</div></div>`;
        html += `<div class="acc-stat"><div class="l">强平</div><div class="v">${a.sl?'$'+fp(a.sl):'--'}</div></div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    $('acc-container').innerHTML = html;
  } else {
    $('acc-container').innerHTML = '<div class="loading" style="padding:20px;text-align:center;color:var(--dim)">暂无账户数据</div>';
  }
  
  $('last-update').textContent = m.last_update || '--';
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
