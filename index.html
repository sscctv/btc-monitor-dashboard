<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 交易监控</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f0f1a; color: #fff; }
.green { color: #2ecc71; }
.red { color: #e74c3c; }
.yellow { color: #f1c40f; }
.cyan { color: #00d4ff; }
.tab-bar { display: flex; background: #1a1a2e; border-bottom: 2px solid #333; }
.tab-btn { flex: 1; padding: 16px 0; text-align: center; font-size: 1.05rem; font-weight: bold; color: #555; cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #00d4ff; border-bottom-color: #00d4ff; }
.tab-content { display: none; padding: 10px; }
.tab-content.active { display: block; }
.card { background: #1a1a2e; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.price { font-size: 2.2rem; color: #00d4ff; text-align: center; }
.label { color: #888; font-size: 0.75rem; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
.b-wait { background: #333; color: #888; }
.b-long { background: rgba(39,174,96,0.3); color: #2ecc71; }
.b-short { background: rgba(231,76,60,0.3); color: #e74c3c; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
.cell-label { color: #666; font-size: 0.7rem; margin-bottom: 2px; }
.cell-value { font-size: 0.95rem; font-weight: bold; }
.acc-group { background: #1a1a2e; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
.acc-header { border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 8px; }
.acc-name { font-weight: bold; margin-bottom: 4px; }
.acc-total { font-size: 1.2rem; font-weight: bold; }
.pos { color: #2ecc71; }
.neg { color: #e74c3c; }
.zero { color: #888; }
.pos-table { background: #141428; border-radius: 8px; padding: 8px; margin-bottom: 6px; }
.pos-dir { display: flex; justify-content: space-between; padding-bottom: 6px; border-bottom: 1px solid #333; margin-bottom: 6px; }
.pos-dir-label.long { color: #2ecc71; }
.pos-dir-label.short { color: #e74c3c; }
.pos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.pos-cell { text-align: center; }
.pos-cell-label { color: #555; font-size: 0.65rem; }
.pos-cell-value { font-size: 0.8rem; }
.no-data { text-align: center; color: #555; padding: 20px; }
.loading { text-align: center; color: #555; padding: 20px; }
.update-time { text-align: center; color: #555; font-size: 0.7rem; padding: 4px; }
.bars { display: flex; align-items: center; gap: 6px; }
.bias-bar { height: 6px; background: #333; border-radius: 3px; flex: 1; }
.bias-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #e74c3c, #f1c40f, #2ecc71); }
</style>
</head>
<body>
<div class="tab-bar">
  <button class="tab-btn active" id="btn-market" onclick="switchTab('market')">📊 市场</button>
  <button class="tab-btn" id="btn-accounts" onclick="switchTab('accounts')">📱 账号</button>
  <button class="tab-btn" id="btn-virt" onclick="switchTab('virt')">🎮 虚拟</button>
</div>

<!-- Market Tab -->
<div id="tab-market" class="tab-content active">
  <div class="card">
    <div class="price" id="price">--</div>
    <div style="text-align:center;margin-top:6px">
      <span class="badge b-wait" id="badge">等待</span>
    </div>
    <div class="update-time" id="update">--</div>
  </div>

  <div class="card">
    <div class="label">24h区间</div>
    <div class="grid">
      <div><div class="label">低</div><div class="cyan" id="low24">--</div></div>
      <div><div class="label">高</div><div class="yellow" id="high24">--</div></div>
      <div><div class="label">方向</div><div id="dir">--</div></div>
      <div><div class="label">信号</div><div id="signal">--</div></div>
    </div>
  </div>

  <div class="card">
    <div class="label">技术指标</div>
    <div class="grid">
      <div><div class="cell-label">RSI</div><div class="cell-value cyan" id="rsi">--</div></div>
      <div><div class="cell-label">ADX</div><div class="cell-value cyan" id="adx">--</div></div>
      <div><div class="cell-label">MACD</div><div class="cell-value" id="macd">--</div></div>
      <div><div class="cell-label">CVD</div><div class="cell-value" id="cvd">--</div></div>
    </div>
    <div class="grid" style="margin-top:8px">
      <div><div class="cell-label">资金费率</div><div class="cell-value" id="funding">--</div></div>
      <div><div class="cell-label">深度</div><div class="cell-value" id="book">--</div></div>
      <div><div class="cell-label">ATR</div><div class="cell-value cyan" id="atr">--</div></div>
      <div><div class="cell-label">价差</div><div class="cell-value" id="spread">--</div></div>
    </div>
    <div class="grid" style="margin-top:8px">
      <div><div class="cell-label">情绪</div><div class="cell-value yellow" id="sentiment">--</div></div>
      <div><div class="cell-label">市场状态</div><div class="cell-value" id="state">--</div></div>
      <div><div class="cell-label"> Bias</div><div class="cell-value" id="biasText">--</div></div>
      <div><div class="cell-label">趋势</div><div class="cell-value" id="trend">--</div></div>
    </div>
    <div class="bars" style="margin-top:8px">
      <div class="label">Bias</div>
      <div class="bias-bar"><div class="bias-fill" id="biasBar" style="width:50%"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="label">资金费率下次结算</div>
    <div class="grid">
      <div><div class="cell-label">下次结算</div><div class="cell-value cyan" id="nextfunding">--</div></div>
      <div><div class="cell-label">OI持仓量</div><div class="cell-value" id="oi">--</div></div>
      <div><div class="cell-label">OI信号</div><div class="cell-value" id="oinew">--</div></div>
      <div><div class="cell-label">收割预警</div><div class="cell-value green" id="harvest">正常</div></div>
    </div>
  </div>
</div>

<!-- Accounts Tab -->
<div id="tab-accounts" class="tab-content">
  <div class="update-time" id="acc-update">--</div>
  <div id="acc-list"><div class="loading">加载中...</div></div>
</div>

<!-- Virt Tab -->
<div id="tab-virt" class="tab-content">
  <div class="update-time" id="virt-update">--</div>
  <div id="virt-list"><div class="loading">加载中...</div></div>
</div>

<script>
const SB_URL = 'https://lpcrnobolifrzwrkxoli.supabase.co';
const SB_KEY = 'sb_publishable_8gEsCRNRc7py6BmypYuRIw_sNtKooug';

function fmt(n, d=1) { return n != null && !isNaN(n) ? n.toFixed(d) : '--'; }
function fmtP(n) { return n != null && !isNaN(n) ? Math.round(n).toLocaleString() : '--'; }

function sigLabel(mode) {
  var map = {
    'long':          { text: '做多信号 🟢', badge: 'b-long',  color: '#2ecc71' },
    'long_pending':  { text: '等待做多 ⏸️', badge: 'b-long',  color: '#2ecc71' },
    'short':         { text: '做空信号 🔴', badge: 'b-short', color: '#e74c3c' },
    'short_pending': { text: '等待做空 ⏸️', badge: 'b-short', color: '#e74c3c' },
    'wait':          { text: '等待信号 ⏸️',  badge: 'b-wait',  color: '#888' }
  };
  return map[mode] || map['wait'];
}

async function load() {
  try {
    const [mRes, sigRes, tradesRes, accRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/btcmarketdata?order=created_at.desc&limit=1`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
      fetch(`${SB_URL}/rest/v1/btcsignal_realtime?order=ts.desc&limit=1`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
      fetch(`${SB_URL}/rest/v1/btc_trades?status=eq.open&order=created_at.desc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } }),
      fetch(`${SB_URL}/rest/v1/btc_accounts?select=*&order=account_id.asc`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } })
    ]);

    const mData = await mRes.json();
    const sigData = await sigRes.json();
    const tradesData = await tradesRes.json();
    const accData = await accRes.json();

    if (!mData || mData.length === 0) return;
    const m = mData[0];
    const sig = sigData[0] || {};

    const now = new Date(m.created_at).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
    const mode = sig.mode || 'wait';
    const si = sigLabel(mode);

    const price = sig.price || m.price;
    const rsi = sig.rsi || m.rsi || 50;
    const adx = sig.adx || m.adx || 0;
    const cvdVal = sig.cvd || m.cvd || 0;
    const fr = m.funding_rate || 0;
    const bidS = m.bid_size || 0, askS = m.ask_size || 0;
    const diff = bidS - askS;
    const bookPct = Math.abs((diff / Math.max(bidS, askS, 1) * 100)).toFixed(0);
    const spr = m.spread || 0;
    const trend = sig.sentiment || m.trend || 'neutral';
    const marketState = mode;
    const pct = Math.max(10, Math.min(90, trend === '偏多' ? 75 : trend === '偏空' ? 25 : 50));

    document.getElementById('price').textContent = fmtP(price);
    document.getElementById('low24').textContent = fmtP(m.low24h);
    document.getElementById('high24').textContent = fmtP(m.high24h);
    document.getElementById('signal').textContent = si.text;
    document.getElementById('badge').textContent = si.text;
    document.getElementById('badge').className = 'badge ' + si.badge;
    document.getElementById('biasBar').style.width = pct + '%';
    document.getElementById('biasText').textContent = (trend === '偏多' ? '偏多' : trend === '偏空' ? '偏空' : '中性') + ' ' + pct + '%';
    document.getElementById('rsi').textContent = fmt(rsi);
    document.getElementById('rsi').className = 'cell-value ' + (rsi < 40 ? 'green' : rsi > 70 ? 'red' : rsi < 50 ? 'yellow' : 'cyan');
    document.getElementById('adx').textContent = fmt(adx);
    document.getElementById('adx').className = 'cell-value ' + (adx > 25 ? 'green' : 'red');
    var macd = m.macd || 0;
    document.getElementById('macd').textContent = macd > 0 ? '↑' : '↓';
    document.getElementById('macd').className = 'cell-value ' + (macd > 0 ? 'green' : 'red');
    document.getElementById('cvd').textContent = (cvdVal >= 0 ? '+' : '') + (cvdVal / 1000).toFixed(1) + 'k';
    document.getElementById('cvd').className = 'cell-value ' + (cvdVal > 0 ? 'green' : 'red');
    document.getElementById('funding').textContent = fmt(fr * 100, 3) + '%';
    document.getElementById('funding').className = 'cell-value ' + (fr > 0 ? 'red' : 'green');
    document.getElementById('atr').textContent = '$' + fmt(m.atr, 0);
    document.getElementById('book').textContent = diff > 0 ? '买+' + bookPct + '%' : '卖+' + bookPct + '%';
    document.getElementById('book').className = 'cell-value ' + (diff > 0 ? 'green' : 'red');
    document.getElementById('spread').textContent = spr > 0 ? '$' + fmt(spr, 1) : '--';
    document.getElementById('spread').className = 'cell-value ' + (spr > 1 ? 'red' : spr > 0.5 ? 'yellow' : 'green');
    document.getElementById('sentiment').textContent = sig.sentiment || m.trend || '--';
    document.getElementById('sentiment').className = 'cell-value ' + (sig.sentiment === '强势看多' ? 'green' : sig.sentiment === '强势看空' ? 'red' : 'yellow');
    var stateMap = {'oscillation':'震荡','trend':'趋势','strong_trend':'强趋势','extreme':'极端','wait':'观望','long':'多头信号','short':'空头信号','long_pending':'等待多头','short_pending':'等待空头'};
    document.getElementById('state').textContent = stateMap[marketState] || '--';
    document.getElementById('dir').textContent = si.text;
    document.getElementById('dir').style.color = si.color;
    document.getElementById('trend').textContent = trend === '偏多' ? '多头' : trend === '偏空' ? '空头' : '中性';
    document.getElementById('trend').className = trend === '偏多' ? 'green' : trend === '偏空' ? 'red' : 'yellow';
    document.getElementById('update').textContent = now;

    var nowBeijing = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Shanghai'}));
    var h = nowBeijing.getHours();
    var nextH = h < 8 ? 8 : h < 16 ? 16 : 24;
    document.getElementById('nextfunding').textContent = String(nextH).padStart(2,'0') + ':00';
    document.getElementById('nextfunding').className = 'cell-value cyan';
    var oiVal = m.oi || 0;
    document.getElementById('oi').textContent = oiVal > 0 ? (oiVal / 1e6).toFixed(2) + 'M' : '--';
    document.getElementById('oi').className = 'cell-value ' + (oiVal > 0 ? 'cyan' : 'yellow');
    var oiTrend = m.oi_trend || 'neutral';
    var oiTrendText = {'neutral':'中立','increasing':'↑增','decreasing':'↓减','divergence_bear':'⚠️诱多','divergence_bull':'⚠️诱空'};
    document.getElementById('oinew').textContent = oiTrendText[oiTrend] || oiTrend;
    document.getElementById('oinew').className = 'cell-value ' + (oiTrend === 'neutral' ? 'yellow' : oiTrend === 'increasing' ? 'green' : 'red');
    var harvestAlerts = m.harvest_warnings || [];
    var harvestText = harvestAlerts.length > 0 ? '⚠️ ' + harvestAlerts.length + '条' : '正常';
    document.getElementById('harvest').textContent = harvestText;
    document.getElementById('harvest').className = 'cell-value ' + (harvestAlerts.length > 0 ? 'red' : 'green');

    // === Accounts tab ===
    var accMap = {};
    for (var a of accData) accMap[a.account_id] = a;
    var tradesByAcc = {};
    for (var t of tradesData) {
      if (!tradesByAcc[t.account_id]) tradesByAcc[t.account_id] = [];
      tradesByAcc[t.account_id].push(t);
    }
    var displayOrder = ['V1','V2','V3','账号1','账号2','账号3','账号4','账号5','真实账户'];
    var html = '';
    for (var accName of displayOrder) {
      var acc = accMap[accName];
      if (!acc) continue;
      var isReal = accName === '真实账户';
      var isIdle = acc.status === 'idle';
      var trades = tradesByAcc[accName] || [];
      var totalPnl = 0;
      for (var t of trades) totalPnl += (t.unrealizedpnl || 0);
      var totalAssets = (acc.capital || 0) + totalPnl;
      var pnlClass = totalPnl > 0.005 ? 'pos' : totalPnl < -0.005 ? 'neg' : 'zero';
      html += '<div class="acc-group">';
      html += '<div class="acc-header' + (isReal ? ' real' : '') + '">';
      html += '<div class="acc-name"' + (isReal ? ' style="color:#f39c12"' : '') + '>' + accName + ' <span>' + (acc.strategy || '') + '</span></div>';
      html += '<div><div class="acc-total ' + pnlClass + '">' + (totalAssets >= 0 ? '+' : '') + fmt(totalAssets, 2) + 'U</div>';
      html += '<div class="acc-sub">余额 <span>' + fmt(acc.capital, 2) + '</span> + 浮动 <span class="' + pnlClass + '">' + (totalPnl >= 0 ? '+' : '') + fmt(totalPnl, 2) + '</span></div></div></div>';
      for (var t of trades) {
        var sideLabel = t.side === 'long' ? '做多' : '做空';
        var pnlVal = t.unrealizedpnl || 0;
        var pnlClass2 = pnlVal > 0.005 ? 'pos' : pnlVal < -0.005 ? 'neg' : 'zero';
        var margin = t.margin || null;
        if (!margin && t.entry_price && t.size && t.leverage) margin = (t.entry_price * t.size * 0.01) / t.leverage;
        var liq = t.liqprice || t.liq_price || null;
        if (!liq && t.entry_price && t.leverage) liq = t.side === 'long' ? t.entry_price * (1 + 1/t.leverage) : t.entry_price * (1 - 1/t.leverage);
        html += '<div class="pos-table">';
        html += '<div class="pos-dir ' + t.side + '">';
        html += '<div class="pos-dir-label ' + t.side + '">' + sideLabel + ' ×' + (t.leverage || '--') + ' ' + (t.size || 0) + '张</div>';
        html += '<div class="pos-pnl ' + pnlClass2 + '">' + (pnlVal >= 0 ? '+' : '') + fmt(pnlVal, 2) + 'U</div>';
        html += '</div>';
        html += '<div class="pos-grid">';
        html += '<div class="pos-cell"><div class="pos-cell-label">开仓均价</div><div class="pos-cell-value">$' + fmtP(t.entry_price) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">当前价</div><div class="pos-cell-value cyan">$' + fmtP(price) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">预估强平价</div><div class="pos-cell-value yellow">' + (liq ? '$' + fmtP(liq) : '--') + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">保证金</div><div class="pos-cell-value">' + (margin ? fmt(margin, 2) : '--') + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">止盈</div><div class="pos-cell-value pos">$' + fmtP(t.tp) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">止损</div><div class="pos-cell-value neg">$' + fmtP(t.sl) + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">可平量</div><div class="pos-cell-value">' + ((t.size || 0) > 0 ? t.size + ' 张' : '--') + '</div></div>';
        html += '<div class="pos-cell"><div class="pos-cell-label">浮动盈亏</div><div class="pos-cell-value ' + pnlClass2 + '">' + (pnlVal >= 0 ? '+' : '') + fmt(pnlVal, 2) + '</div></div>';
        html += '</div></div>';
      }
      if (isIdle && trades.length === 0) html += '<div class="acc-idle">空仓 · 本金 <span>' + fmt(acc.capital, 2) + 'U</span></div>';
      html += '</div>';
    }
    if (!html) html = '<div class="no-data">暂无账号数据</div>';
    document.getElementById('acc-list').innerHTML = html;
    document.getElementById('acc-update').textContent = now;

  } catch(e) { console.log('Market load error:', e); }
}

async function loadVirt() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/btcsignal_realtime?order=ts.desc&limit=1`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    const sigData = await res.json();
    if (!sigData || sigData.length === 0) return;
    const sig = sigData[0];
    const si = sigLabel(sig.mode);
    const html = '<div class="card">' +
      '<div style="text-align:center"><div class="label">BTC</div><div class="cyan">$' + fmtP(sig.price) + '</div></div>' +
      '<div style="display:flex;justify-content:space-around;margin-top:8px">' +
      '<div style="text-align:center"><div class="label">信号</div><div style="color:' + si.color + '">' + si.text + '</div></div>' +
      '<div style="text-align:center"><div class="label">RSI</div><div>' + fmt(sig.rsi) + '</div></div>' +
      '<div style="text-align:center"><div class="label">ADX</div><div>' + fmt(sig.adx) + '</div></div>' +
      '<div style="text-align:center"><div class="label">CVD</div><div>' + (sig.cvd >= 0 ? '+' : '') + fmt(sig.cvd) + '</div></div>' +
      '</div></div>';
    document.getElementById('virt-list').innerHTML = html;
    document.getElementById('virt-update').textContent = new Date(sig.created_at).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
  } catch(e) { console.log('Virt load error:', e); }
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

load();
setInterval(load, 15000);
setInterval(loadVirt, 10000);
</script>
</body>
</html>
