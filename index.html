<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>BTC Dashboard</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总交易数</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">总盈亏</div>
                        <div class="card-value" id="totalPnl">--</div>
                        <div class="card-change" id="pnlPercent">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">胜率</div>
                        <div class="card-value" id="winRate">--</div>
                    </div>
                </div>
            </section>

            <section class="chart-section">
                <div class="section-header">
                    <h2>盈亏分布</h2>
                </div>
                <div class="chart-wrapper">
                    <div id="pieChart" class="chart"></div>
                </div>
            </section>

            <section class="chart-section">
                <div class="section-header">
                    <h2>收益曲线</h2>
                    <div class="time-filters">
                        <button class="time-btn active" data-range="7d">7天</button>
                        <button class="time-btn" data-range="30d">30天</button>
                        <button class="time-btn" data-range="all">全部</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <div id="lineChart" class="chart"></div>
                </div>
            </section>

            <section class="strategies-section">
                <div class="section-header">
                    <h2>账户列表</h2>
                </div>
                <div class="strategies-grid" id="strategiesGrid">
                    <div class="loading-spinner">加载中...</div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active"><span class="nav-icon">📊</span><span>首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span>策略</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span>交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span>信号</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📜</span><span>历史</span></a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="api.js"></script>
    <script>
        let pieChart, lineChart;
        let allTrades = [];

        async function loadDashboardData() {
            const statusEl = document.getElementById('dbStatus');
            const statusTextEl = document.getElementById('dbStatusText');

            try {
                const trades = await fetchAllTrades();

                if (trades && trades.length > 0) {
                    allTrades = trades;
                    statusEl.className = 'status-dot online';
                    statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';
                    updateOverview(trades);
                    updateStrategiesGrid(trades);
                    updatePieChart(trades);
                    updateLineChart(trades);
                } else {
                    useSampleData();
                }
            } catch (error) {
                console.error('Load error:', error);
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线模式';
                useSampleData();
            }
        }

        function useSampleData() {
            const sampleTrades = SAMPLE_BALANCES;
            updateOverview(sampleTrades);
            updateStrategiesGrid(sampleTrades);
            updatePieChart(sampleTrades);
            updateLineChart([]);
            document.getElementById('dbStatusText').textContent = '示例数据';
        }

        function updateOverview(trades) {
            const total = trades.length;
            const totalPnl = trades.reduce((sum, t) => sum + (t.realized_pnl || 0), 0);
            const wins = trades.filter(t => t.realized_pnl > 0).length;
            const winRate = total > 0 ? (wins / total) * 100 : 0;

            document.getElementById('totalTrades').textContent = total;
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = formatNumber(totalPnl);
            pnlEl.className = 'card-value ' + getPnLClass(totalPnl);
            const pctEl = document.getElementById('pnlPercent');
            pctEl.textContent = formatPercent((totalPnl / (total * 1000)) * 100);
            pctEl.className = 'card-change ' + getPnLClass(totalPnl);
            document.getElementById('winRate').textContent = winRate.toFixed(1) + '%';
        }

        function updateStrategiesGrid(trades) {
            const grid = document.getElementById('strategiesGrid');
            const stats = transformTradesData(trades);
            
            if (stats.length === 0) {
                grid.innerHTML = '<div class="loading-spinner">暂无数据</div>';
                return;
            }

            grid.innerHTML = stats.map(function(s) {
                return '<div class="strategy-card">' +
                    '<div class="strategy-header">' +
                    '<span class="strategy-name">' + s.strategy_name + '</span>' +
                    '<span class="strategy-badge ' + getPnLClass(s.total_pnl) + '">' + formatPercent(s.total_pnl_percent) + '</span>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">交易数</span><span class="stat-value">' + s.trade_count + '</span></div>' +
                    '<div class="stat"><span class="stat-label">总盈亏</span><span class="stat-value ' + getPnLClass(s.total_pnl) + '">' + formatNumber(s.total_pnl) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">胜率</span><span class="stat-value">' + s.win_rate.toFixed(1) + '%</span></div>' +
                    '</div></div>';
            }).join('');
        }

        function updatePieChart(trades) {
            if (!pieChart) pieChart = echarts.init(document.getElementById('pieChart'));
            const stats = transformTradesData(trades);
            const data = stats.map(function(s, i) { 
                return { name: s.strategy_name, value: Math.abs(s.total_pnl) || 1 }; 
            });
            pieChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: ${c}' },
                legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#8892b0', fontSize: 12 } },
                series: [{
                    type: 'pie', radius: ['40%', '70%'], center: ['35%', '50%'],
                    itemStyle: { borderRadius: 10, borderColor: '#0a192f', borderWidth: 2 },
                    label: { show: false },
                    emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } },
                    data: data,
                    color: ['#00d4aa', '#5c7cfa', '#ff6b6b', '#fcc419', '#845ef7', '#20c997', '#f06595', '#ff922b', '#36cfc9', '#7cb305']
                }]
            });
        }

        function updateLineChart(trades) {
            if (!lineChart) lineChart = echarts.init(document.getElementById('lineChart'));
            
            var dailyPnL = {};
            trades.forEach(function(t) {
                if (t.opened_at) {
                    var date = t.opened_at.substring(0, 10);
                    dailyPnL[date] = (dailyPnL[date] || 0) + (t.realized_pnl || 0);
                }
            });

            var dates = Object.keys(dailyPnL).sort().slice(-30);
            var cumulative = 0;
            var cumulativeData = dates.map(function(d) {
                cumulative += dailyPnL[d];
                return cumulative;
            });

            if (dates.length === 0) {
                var days = 30, sampleDates = [], sampleData = [];
                var value = 0;
                for (var i = days; i >= 0; i--) {
                    var date2 = new Date();
                    date2.setDate(date2.getDate() - i);
                    sampleDates.push((date2.getMonth() + 1) + '/' + date2.getDate());
                    value += (Math.random() - 0.48) * 100;
                    sampleData.push(value);
                }
                dates = sampleDates;
                cumulativeData = sampleData;
            }

            lineChart.setOption({
                tooltip: { trigger: 'axis', formatter: '{b}: ${c}' },
                grid: { left: 50, right: 20, top: 20, bottom: 30 },
                xAxis: { type: 'category', data: dates, boundaryGap: false, axisLine: { lineStyle: { color: '#233554' } }, axisLabel: { color: '#8892b0', fontSize: 10 } },
                yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: '#233554' } }, axisLabel: { color: '#8892b0', formatter: '${value}' } },
                series: [{ data: cumulativeData, type: 'line', smooth: true, lineStyle: { width: 3, color: '#00d4aa' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(0,212,170,0.3)' }, { offset: 1, color: 'rgba(0,212,170,0)' }] } } }]
            });
        }

        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            if (pieChart) pieChart.resize();
            if (lineChart) lineChart.resize();
        });

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
