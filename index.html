<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 智能交易监控面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a14; color: #e0e0e0; font-size: 14px; }
h1 { color: #00d4ff; text-align: center; padding: 16px 0 8px; font-size: 1.3rem; }
.subtitle { text-align: center; color: #555; font-size: 0.75rem; margin-bottom: 12px; }

.top-bar { display: flex; justify-content: space-around; background: #111122; border-radius: 12px; padding: 12px; margin: 0 10px 12px; gap: 10px; }
.top-stat { text-align: center; flex: 1; }
.top-stat .label { color: #555; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
.top-stat .value { font-size: 1.2rem; font-weight: 700; margin-top: 2px; }
.green { color: #2ecc71; }
.red { color: #e74c3c; }
.yellow { color: #f1c40f; }
.cyan { color: #00d4ff; }
.orange { color: #e67e22; }
.grey { color: #888; }

.card { background: #111122; border-radius: 12px; padding: 12px; margin: 0 10px 10px; }
.card-title { color: #00d4ff; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
.row:last-child { border-bottom: none; }
.row .label { color: #555; font-size: 0.75rem; }
.row .val { font-weight: 600; font-size: 0.85rem; }
.signal-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
.b-long { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
.b-short { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
.b-wait { background: rgba(100,100,100,0.2); color: #888; border: 1px solid #555; }
.b-pending { background: rgba(243,156,18,0.2); color: #f39c12; border: 1px solid #f39c12; }

.section-title { color: #00d4ff; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin: 12px 10px 6px; }

.account-card { background: #111122; border-radius: 12px; padding: 12px; margin: 0 10px 8px; }
.acc-header { display: flex; justify-content: space-between; align-items: center; }
.acc-name { font-size: 1rem; font-weight: 700; }
.acc-balance { font-size: 1.1rem; font-weight: 700; }
.acc-status { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; }
.status-long { background: rgba(46,204,113,0.2); color: #2ecc71; }
.status-short { background: rgba(231,76,60,0.2); color: #e74c3c; }
.status-idle { background: rgba(100,100,100,0.2); color: #888; }
.acc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
.acc-stat { text-align: center; background: #0a0a14; border-radius: 8px; padding: 6px; }
.acc-stat .l { color: #444; font-size: 0.6rem; text-transform: uppercase; }
.acc-stat .v { font-size: 0.85rem; font-weight: 700; margin-top: 2px; }

.trade-item { background: #111122; border-radius: 10px; padding: 10px; margin: 0 10px 6px; display: flex; justify-content: space-between; align-items: center; }
.trade-side { font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
.trade-long { background: rgba(46,204,113,0.2); color: #2ecc71; }
.trade-short { background: rgba(231,76,60,0.2); color: #e74c3c; }
.trade-pnl { font-size: 1rem; font-weight: 700; }
.trade-info { flex: 1; margin-left: 10px; font-size: 0.7rem; color: #555; }

.signal-detail { font-size: 0.75rem; color: #555; margin-top: 6px; padding: 6px 8px; background: #0a0a14; border-radius: 6px; line-height: 1.6; }

.alert-item { background: #111122; border-radius: 10px; padding: 10px; margin: 0 10px 6px; border-left: 3px solid; }
.alert-critical { border-color: #e74c3c; }
.alert-warning { border-color: #f39c12; }
.alert-info { border-color: #3498db; }
.alert-time { font-size: 0.6rem; color: #444; }
.alert-msg { font-size: 0.8rem; margin-top: 2px; }

.footer { text-align: center; color: #333; font-size: 0.65rem; padding: 16px; }
.loading { text-align: center; color: #444; padding: 30px; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.live-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 4px; }
</style>
</head>
<body>

<h1>📊 BTC 智能交易监控</h1>
<div class="subtitle"><span class="live-dot"></span>实时 · 数据每5秒更新</div>

<!-- 顶部行情 -->
<div class="top-bar">
  <div class="top-stat">
    <div class="label">BTC 价格</div>
    <div class="value cyan" id="price">--</div>
  </div>
  <div class="top-stat">
    <div class="label">信号</div>
    <div class="value" id="signal-mode">--</div>
  </div>
  <div class="top-stat">
    <div class="label">评分</div>
    <div class="value" id="score">--</div>
  </div>
  <div class="top-stat">
    <div class="label">RSI</div>
    <div class="value" id="rsi">--</div>
  </div>
  <div class="top-stat">
    <div class="label">ADX</div>
    <div class="value" id="adx">--</div>
  </div>
</div>

<!-- 信号卡片 -->
<div class="card">
  <div class="card-title">📈 综合信号分析</div>
  <div class="row">
    <span class="label">信号模式</span>
    <span id="signal-badge"><span class="signal-badge b-wait">等待信号</span></span>
  </div>
  <div class="row">
    <span class="label">盘口深度比</span>
    <span class="val" id="depth-ratio">--</span>
  </div>
  <div class="row">
    <span class="label">大单净流向</span>
    <span class="val" id="big-net">--</span>
  </div>
  <div class="row">
    <span class="label">资金费率</span>
    <span class="val" id="funding-rate">--</span>
  </div>
  <div class="row">
    <span class="label">24h 高/低</span>
    <span class="val" id="high24h">-- / --</span>
  </div>
  <div class="row">
    <span class="label">市场情绪</span>
    <span class="val" id="sentiment">--</span>
  </div>
  <div class="signal-detail" id="signal-desc">加载中...</div>
</div>

<!-- 账户卡片 -->
<div class="section-title">💼 账户概览</div>
<div id="accounts-container">
  <div class="loading">加载账户...</div>
</div>

<!-- 最近交易 -->
<div class="section-title">📋 最近交易记录</div>
<div id="trades-container">
  <div class="loading">加载交易记录...</div>
</div>

<!-- 预警 -->
<div class="section-title">🚨 预警记录</div>
<div id="alerts-container">
  <div class="loading">加载预警...</div>
</div>

<div class="footer">最后更新: <span id="last-update">--</span></div>

<script>
// 所有键都通过 GitHub Pages 环境变量注入，代码中不包含任何密钥
const SB_KEY = window.SUPABASE_KEY || 'sb_publishable_8gEsCRNRc7py6BmypYuRIw_sNtKooug';
const SB_URL = window.SUPABASE_URL || 'https://lpcrnobolifrzwrkxoli.supabase.co/rest/v1';
const SB_SECRET = window.SUPABASE_SECRET || '';

const HEADERS = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json'
};

function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '--';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if (n == null || isNaN(n)) return '--';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function badgeClass(mode) {
  if (mode === 'long') return 'b-long';
  if (mode === 'short') return 'b-short';
  if (mode === 'long_pending' || mode === 'short_pending') return 'b-pending';
  return 'b-wait';
}

function modeLabel(mode) {
  const m = {'long':'做多 🟢','short':'做空 🔴','long_pending':'等待做多 🟡','short_pending':'等待做空 🟡','wait':'等待 ⏸️'};
  return m[mode] || mode || '等待';
}

async function fetchJson(url) {
  try {
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function loadData() {
  // 1. 最新信号
  const signals = await fetchJson(`${SB_URL}/btc_signals?order=ts.desc&limit=1`);
  if (signals && signals.length > 0) {
    const s = signals[0];
    document.getElementById('price').textContent = '$' + fmtPrice(s.price);
    document.getElementById('signal-mode').innerHTML = `<span class="signal-badge ${badgeClass(s.mode)}">${modeLabel(s.mode)}</span>`;
    document.getElementById('score').textContent = (s.score >= 0 ? '+' : '') + fmt(s.score, 2);
    document.getElementById('score').className = 'value ' + (s.score > 0 ? 'green' : s.score < 0 ? 'red' : 'grey');
    document.getElementById('rsi').textContent = fmt(s.rsi, 1);
    document.getElementById('rsi').className = 'value ' + (s.rsi > 65 ? 'red' : s.rsi < 35 ? 'green' : 'grey');
    document.getElementById('adx').textContent = fmt(s.adx, 1);
    document.getElementById('adx').className = 'value ' + (s.adx >= 25 ? 'green' : 'red');
    document.getElementById('depth-ratio').textContent = fmt(s.depth_ratio_5, 2);
    document.getElementById('depth-ratio').className = 'val ' + (s.depth_ratio_5 > 2 ? 'green' : s.depth_ratio_5 < 0.5 ? 'red' : 'grey');
    document.getElementById('big-net').textContent = (s.big_trade_net >= 0 ? '+' : '') + s.big_trade_net + '笔';
    document.getElementById('big-net').className = 'val ' + (s.big_trade_net > 10 ? 'green' : s.big_trade_net < -10 ? 'red' : 'grey');
    document.getElementById('funding-rate').textContent = (s.funding_rate * 100).toFixed(4) + '%';
    document.getElementById('sentiment').textContent = s.sentiment || '--';
    document.getElementById('signal-badge').innerHTML = `<span class="signal-badge ${badgeClass(s.mode)}">${modeLabel(s.mode)}</span>`;
    document.getElementById('signal-desc').innerHTML = `评分: <b>${(s.score>=0?'+':'')}${fmt(s.score,2)}</b> | ${s.sentiment || ''} | ${new Date(s.dt).toLocaleString('zh-CN')}`;
  }

  // 2. 账户
  const accounts = await fetchJson(`${SB_URL}/btc_accounts?order=account.asc&limit=20`);
  const accContainer = document.getElementById('accounts-container');
  if (accounts && accounts.length > 0) {
    let html = '';
    for (const a of accounts) {
      const pnl = a.unrealized_pnl || 0;
      const hasPos = a.pos_side && a.pos_size > 0;
      const sideClass = a.pos_side === 'long' ? 'status-long' : a.pos_side === 'short' ? 'status-short' : 'status-idle';
      const sideLabel = a.pos_side === 'long' ? '多单' : a.pos_side === 'short' ? '空单' : '空仓';
      html += `
      <div class="account-card">
        <div class="acc-header">
          <div>
            <div class="acc-name">${a.account || a.account_id}</div>
            <div class="acc-status ${sideClass}">${sideLabel} · ${a.strategy || a.account || ''}</div>
          </div>
          <div style="text-align:right">
            <div class="acc-balance ${pnl >= 0 ? 'green' : 'red'}">${pnl >= 0 ? '+' : ''}${fmt(pnl, 2)}U</div>
            <div style="font-size:0.7rem;color:#555">余额 ${fmt(a.balance)}U</div>
          </div>
        </div>
        ${hasPos ? `
        <div class="acc-grid">
          <div class="acc-stat"><div class="l">持仓</div><div class="v">${fmt(a.pos_size, 4)}</div></div>
          <div class="acc-stat"><div class="l">均价</div><div class="v">$${fmtPrice(a.entry_price)}</div></div>
          <div class="acc-stat"><div class="l">强平</div><div class="v" style="color:${a.liq_price > 0 ? '#e74c3c' : '#555'}">${a.liq_price > 0 ? '$'+fmtPrice(a.liq_price) : '--'}</div></div>
        </div>` : ''}
      </div>`;
    }
    accContainer.innerHTML = html;
  } else {
    accContainer.innerHTML = '<div class="loading">暂无账户数据</div>';
  }

  // 3. 最近交易
  const trades = await fetchJson(`${SB_URL}/btc_trades?order=ts.desc&limit=10`);
  const tradeContainer = document.getElementById('trades-container');
  if (trades && trades.length > 0) {
    let html = '';
    for (const t of trades) {
      const pnl = t.pnl || 0;
      html += `
      <div class="trade-item">
        <div>
          <span class="trade-side ${t.side === 'long' ? 'trade-long' : 'trade-short'}">${t.side === 'long' ? '做多' : t.side === 'short' ? '做空' : t.action}</span>
        </div>
        <div class="trade-info">
          <div>${t.account} · ${t.strategy || ''} · ${t.signal_mode || ''}</div>
          <div>开:${fmtPrice(t.entry_price)} → 平:${fmtPrice(t.exit_price)} · ${new Date(t.dt).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="trade-pnl ${pnl >= 0 ? 'green' : 'red'}">${pnl >= 0 ? '+' : ''}${fmt(pnl, 2)}U</div>
      </div>`;
    }
    tradeContainer.innerHTML = html;
  } else {
    tradeContainer.innerHTML = '<div class="loading">暂无交易记录</div>';
  }

  // 4. 预警
  const alerts = await fetchJson(`${SB_URL}/btc_alerts?order=ts.desc&limit=5`);
  const alertContainer = document.getElementById('alerts-container');
  if (alerts && alerts.length > 0) {
    let html = '';
    for (const a of alerts) {
      const cls = a.severity === 'critical' ? 'alert-critical' : a.severity === 'warning' ? 'alert-warning' : 'alert-info';
      html += `
      <div class="alert-item ${cls}">
        <div class="alert-time">${new Date(a.dt).toLocaleString('zh-CN')}</div>
        <div class="alert-msg">${a.message}</div>
      </div>`;
    }
    alertContainer.innerHTML = html;
  } else {
    alertContainer.innerHTML = '<div class="loading">暂无预警</div>';
  }

  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-CN');
}

// 启动时加载一次，之后每5秒刷新
loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
