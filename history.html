<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - BTC Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>历史记录</h1>
            <div class="connection-status">
                <span id="dbStatus" class="status-dot offline"></span>
                <span id="dbStatusText">连接中...</span>
            </div>
        </header>

        <main class="main-content">
            <section class="overview-section">
                <div class="overview-cards">
                    <div class="card">
                        <div class="card-label">总交易</div>
                        <div class="card-value" id="totalTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">盈利</div>
                        <div class="card-value profit" id="winningTrades">--</div>
                    </div>
                    <div class="card">
                        <div class="card-label">亏损</div>
                        <div class="card-value loss" id="losingTrades">--</div>
                    </div>
                </div>
            </section>

            <section class="strategies-section">
                <div class="section-header">
                    <h2>交易历史</h2>
                </div>
                <div class="strategies-grid" id="historyGrid">
                    <div class="loading-spinner">加载中...</div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">首页</span></a>
            <a href="strategies.html" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">策略</span></a>
            <a href="virtual.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">交易</span></a>
            <a href="signals.html" class="nav-item"><span class="nav-icon">📡</span><span class="nav-text">信号</span></a>
            <a href="history.html" class="nav-item active"><span class="nav-icon">📜</span><span class="nav-text">历史</span></a>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        async function loadHistory() {
            var statusEl = document.getElementById('dbStatus');
            var statusTextEl = document.getElementById('dbStatusText');

            try {
                var trades = await fetchAllTrades();

                statusEl.className = 'status-dot online';
                statusTextEl.textContent = API_CONFIG.isLocal ? '本地' : '云端';

                var list = trades || [];
                var wins = list.filter(function(t) { return t.realized_pnl > 0; }).length;
                var losses = list.filter(function(t) { return t.realized_pnl < 0; }).length;

                document.getElementById('totalTrades').textContent = list.length;
                document.getElementById('winningTrades').textContent = wins;
                document.getElementById('losingTrades').textContent = losses;

                renderHistory(list);
            } catch (error) {
                console.error('Load error:', error);
                statusEl.className = 'status-dot offline';
                statusTextEl.textContent = '离线';
                renderHistory([]);
            }
        }

        function renderHistory(trades) {
            var grid = document.getElementById('historyGrid');

            if (trades.length === 0) {
                grid.innerHTML = '<div class="loading-spinner">暂无历史记录</div>';
                return;
            }

            grid.innerHTML = trades.slice(0, 50).map(function(t) {
                var date = t.opened_at ? t.opened_at.replace('T', ' ').substring(0, 16) : '--';
                var closeDate = t.closed_at ? t.closed_at.replace('T', ' ').substring(0, 16) : '--';
                var sideClass = (t.side === 'long' || t.side === 'buy' || t.side === 'BUY') ? 'profit' : ((t.side === 'short' || t.side === 'sell' || t.side === 'SELL') ? 'loss' : '');
                var pnlClass = getPnLClass(t.realized_pnl);

                return '<div class="strategy-card">' +
                    '<div class="strategy-header">' +
                    '<span class="strategy-name">' + (t.strategy || t.account_id || 'Unknown') + '</span>' +
                    '<span class="strategy-badge ' + pnlClass + '">' +
                    (t.realized_pnl >= 0 ? '+' : '') + formatNumber(t.realized_pnl) +
                    '</span>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">方向</span><span class="stat-value ' + sideClass + '">' + (t.side || '--').toUpperCase() + '</span></div>' +
                    '<div class="stat"><span class="stat-label">杠杆</span><span class="stat-value">' + (t.leverage || 0) + 'x</span></div>' +
                    '<div class="stat"><span class="stat-label">开仓价</span><span class="stat-value">' + formatNumber(t.entry_price) + '</span></div>' +
                    '</div>' +
                    '<div class="strategy-stats">' +
                    '<div class="stat"><span class="stat-label">数量</span><span class="stat-value">' + formatNumber(t.size, 4) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">平仓价</span><span class="stat-value">' + formatNumber(t.close_price) + '</span></div>' +
                    '<div class="stat"><span class="stat-label">状态</span><span class="stat-value">' + (t.status || '--') + '</span></div>' +
                    '</div>' +
                    '<div style="margin-top: 12px; text-align: center;">' +
                    '<span style="font-size: 11px; color: var(--text-secondary);">' + date + ' 开仓</span>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
